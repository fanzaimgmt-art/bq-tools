<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BQ Tools — Smart Estimate</title>
<link rel="stylesheet" href="../style.css">
<style>
  body { display: flex; flex-direction: column; }
  .upload-area {
    border: 2px dashed var(--bd); border-radius: 10px; padding: 24px;
    text-align: center; cursor: pointer; transition: all .2s;
    position: relative; background: var(--sf); margin-bottom: 14px;
  }
  .upload-area:hover { border-color: var(--ac); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-area img { max-height: 200px; border-radius: 8px; }

  .estimate-result {
    background: var(--sf); border: 1px solid var(--bd); border-radius: 12px;
    padding: 20px; margin-top: 16px; display: none;
  }
  .estimate-result.on { display: block; animation: fadeIn .3s; }
  .est-section { margin-bottom: 14px; }
  .est-section h3 { font-size: 13px; color: var(--ac); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .est-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; background: var(--bg); border-radius: 6px; margin-bottom: 4px;
    font-size: 14px;
  }
  .est-row .est-label { color: var(--txd); }
  .est-row .est-val { font-weight: 700; }
  .est-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px; background: var(--acd); border: 1px solid rgba(232,197,71,.2);
    border-radius: 8px; font-size: 16px; font-weight: 700;
  }
  .est-total .est-range { color: var(--ac); font-size: 20px; }
  .disclaimer {
    font-size: 13px; color: var(--txd); margin-top: 12px; padding: 10px;
    background: var(--bg); border-radius: 6px; line-height: 1.5;
  }
</style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e8c547">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BQ Tools">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">BQ <span>Tools</span></a>
  <div class="nav-right">
    <a href="/" class="nav-link" data-en="← Back" data-es="← Atrás" data-he="חזור →">← Back</a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="he" onclick="setLang('he')">עב</button>
    </div>
  </div>
</nav>

<div class="page">
  <a href="/" class="page-back" data-en="← All Tools" data-es="← Todas las Herramientas" data-he="כל הכלים →">← All Tools</a>
  <h1 class="page-title" data-en="💰 Smart Estimate" data-he="💰 הערכת עלות חכמה">💰 Smart Estimate</h1>
  <p class="page-sub" data-en="Upload a photo and describe the job. AI estimates materials, labor, and total cost." data-he="העלה תמונה ותאר את העבודה. AI מעריך חומרים, עבודה ועלות כוללת.">Upload a photo and describe the job. AI estimates materials, labor, and total cost.</p>

  <div id="hiw-estimate"></div>
  <script>document.addEventListener('DOMContentLoaded',()=>{if(typeof buildHowItWorks==='function')buildHowItWorks('hiw-estimate',HIW_CONFIGS.estimate)});</script>

  <div id="trainingTip" style="display:none;background:var(--acd);border:1px solid var(--ac);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;">
    💡 <span id="trainingTipText"></span>
  </div>

  <div class="card" style="margin-bottom:14px;">
    <label class="input-label" data-en="Photo of the area" data-es="Foto del área" data-he="תמונה של האזור">Photo of the area</label>
    <div class="upload-area" id="uploadArea">
      <span data-en="Click to upload photo" data-es="Haz clic para subir foto" data-he="לחץ להעלאת תמונה">Click to upload photo</span>
      <input type="file" accept="image/*" id="photoInput">
    </div>

    <label class="input-label" data-en="What needs to be done?" data-es="¿Qué hay que hacer?" data-he="מה צריך לעשות?">What needs to be done?</label>
    <textarea class="textarea" id="jobDesc" placeholder="Replace kitchen tiles, install new backsplash, repair grout in bathroom"></textarea>

    <label class="input-label" style="margin-top:12px;" data-en="Location (for pricing)" data-es="Ubicación (para precios)" data-he="מיקום (לתמחור)">Location</label>
    <input class="input" id="location" placeholder="Los Angeles, CA">
  </div>

  <button class="btn btn-primary btn-large" style="width:100%;" onclick="generateEstimate()" id="genBtn" data-en="🧠 Generate Estimate" data-es="🧠 Generar Estimado" data-he="🧠 צור הערכה">🧠 Generate Estimate</button>

  <div class="estimate-result" id="estResult"></div>
</div>

<footer class="footer"><div class="footer-brand">Powered by BQ Tools — BQ Production LLC</div></footer>

<script src="../js/auth.js"></script>
<script src="../js/crypto.js"></script>
<script src="../js/ai.js"></script>
<script src="../js/common.js"></script>
<script src="../js/assistant.js"></script>
<script>
(async function(){
  try {
    if (typeof isLoggedIn !== 'function' || !isLoggedIn()) return;
    const data = await apiCall('/api/training/knowledge');
    const tip = document.getElementById('trainingTip');
    const text = document.getElementById('trainingTipText');
    const h = document.documentElement.lang === 'he';
    tip.style.display = 'block';
    if (data.knowledge?.trained) {
      tip.style.background = 'rgba(81,207,102,.08)';
      tip.style.borderColor = 'var(--grn)';
      text.innerHTML = h
        ? `<strong style="color:var(--grn);">✓ מאומן</strong> על ${data.knowledge.fileCount} מסמכים — ההערכה תשתמש במחירים שלך`
        : `<strong style="color:var(--grn);">✓ Trained</strong> on ${data.knowledge.fileCount} documents — estimate uses YOUR pricing`;
    } else {
      text.innerHTML = h
        ? `<a href="/training.html" style="color:var(--ac);">העלה חוזים ישנים</a> לקבלת הערכות אישיות המותאמות למחירים שלך`
        : `<a href="/training.html" style="color:var(--ac);">Upload past contracts</a> for personalized estimates using your pricing`;
    }
  } catch {}
})();
</script>
<script>
let photoSrc = null;

function handlePhotoUpload(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    photoSrc = ev.target.result;
    document.getElementById('uploadArea').innerHTML = `<img src="${photoSrc}"><input type="file" accept="image/*" id="photoInput">`;
    document.getElementById('photoInput').addEventListener('change', handlePhotoUpload);
  };
  r.readAsDataURL(f);
}
document.getElementById('photoInput').addEventListener('change', handlePhotoUpload);

async function generateEstimate() {
  if (!requirePro()) return;

  const desc = document.getElementById('jobDesc').value.trim();
  if (!desc) { showToast(lang === 'he' ? 'תאר את העבודה' : 'Describe the job', 'err'); return; }

  const ok = await confirmCredit('estimate', lang === 'he' ? 'הערכת עלות' : 'Smart Estimate');
  if (!ok) return;

  const loc = document.getElementById('location').value.trim();
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = '⏳...';

  try {
    const images = [];
    if (photoSrc) {
      images.push(await resizeForAPI(photoSrc));
    }

    const prompt = `You are a construction cost estimator. Based on the photo (if provided) and description, provide a cost estimate.

Job: ${desc}
${loc ? 'Location: ' + loc : 'Location: US average'}

Respond JSON only:
{
  "materials": [{"item": "name", "estimated_cost": "$X - $Y"}],
  "labor_hours": "X-Y hours",
  "labor_cost": "$X - $Y",
  "total_low": "$X",
  "total_high": "$Y",
  "recommended_materials": ["recommendation 1", "recommendation 2"],
  "notes": "brief note about the estimate"
}`;

    const text = await callWorkerAI('estimate', prompt, images, desc.substring(0, 50));
    const r = parseAIJSON(text);

    const el = document.getElementById('estResult');
    el.classList.add('on');
    el.innerHTML = `
      <div class="est-section">
        <h3 data-en="Materials" data-es="Materiales" data-he="חומרים">Materials</h3>
        ${r.materials.map(m => `<div class="est-row"><span class="est-label">${m.item}</span><span class="est-val">${m.estimated_cost}</span></div>`).join('')}
      </div>
      <div class="est-section">
        <h3 data-en="Labor" data-es="Mano de Obra" data-he="עבודה">Labor</h3>
        <div class="est-row"><span class="est-label" data-en="Hours" data-es="Horas" data-he="שעות">Hours</span><span class="est-val">${r.labor_hours}</span></div>
        <div class="est-row"><span class="est-label" data-en="Cost" data-es="Costo" data-he="עלות">Cost</span><span class="est-val">${r.labor_cost}</span></div>
      </div>
      <div class="est-total">
        <span data-en="Total Estimate" data-es="Estimado Total" data-he="הערכה כוללת">Total Estimate</span>
        <span class="est-range">${r.total_low} — ${r.total_high}</span>
      </div>
      ${r.recommended_materials?.length ? `<div class="est-section" style="margin-top:14px;"><h3 data-en="Recommended" data-es="Recomendado" data-he="מומלץ">Recommended</h3>${r.recommended_materials.map(m => `<div class="est-row"><span>${m}</span></div>`).join('')}</div>` : ''}
      ${r.notes ? `<div class="est-row" style="margin-top:8px;"><span class="est-label">${r.notes}</span></div>` : ''}
      <div class="disclaimer" data-en="⚠️ This is an AI estimate for reference only. Final costs may vary based on actual conditions, material availability, and local labor rates. Always get multiple quotes from licensed contractors." data-he="⚠️ זוהי הערכת AI לייחוס בלבד. עלויות סופיות עשויות להשתנות. קבל תמיד מספר הצעות מקבלנים מורשים.">⚠️ This is an AI estimate for reference only. Final costs may vary based on actual conditions, material availability, and local labor rates.</div>`;

    setLang(lang);
    showToast(lang === 'he' ? 'הערכה מוכנה!' : 'Estimate ready!', 'ok');

  } catch(err) {
    showToast('Error: ' + err.message, 'err');
  }

  btn.disabled = false;
  btn.textContent = lang === 'he' ? '🧠 צור הערכה' : '🧠 Generate Estimate';
}
</script>
</body>
</html>
