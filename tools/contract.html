<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BQ Tools — Contract Generator</title>
<link rel="stylesheet" href="../style.css">
<style>
  body { display: flex; flex-direction: column; }

  .contract-preview {
    background: #fff; color: #222; border-radius: 12px; padding: 40px;
    margin-top: 20px; font-family: var(--font-en); display: none;
    line-height: 1.7;
  }
  .contract-preview.show { display: block; animation: fadeInUp .5s; }
  .cp-header { text-align: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--ac); }
  .cp-header h1 { font-size: 22px; font-weight: 900; color: var(--ac); margin-bottom: 4px; letter-spacing: 1px; }
  .cp-header p { font-size: 13px; color: #666; }
  .cp-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .cp-party { background: #faf8f0; padding: 14px; border-radius: 8px; font-size: 13px; }
  .cp-party .p-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .cp-party .p-name { font-weight: 700; font-size: 15px; }

  .cp-section { margin-bottom: 18px; font-size: 13px; }
  .cp-section h2 { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 6px; padding-bottom: 3px; border-bottom: 1px solid #e0e0e0; }
  .cp-section p { color: #444; white-space: pre-line; }

  .cp-sign { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 32px; padding-top: 20px; border-top: 2px solid var(--ac); font-size: 13px; }
  .cp-sign-block .s-line { border-bottom: 1px solid #333; height: 30px; margin-bottom: 4px; }
  .cp-sign-block .s-label { font-size: 11px; color: #666; }
  .cp-footer { text-align: center; margin-top: 24px; font-size: 10px; color: #999; }

  .cp-actions { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .cp-actions .btn { flex: 1; min-width: 140px; }

  @media print {
    nav, .page > *:not(.contract-preview), .cp-actions, footer { display: none !important; }
    body { background: white; }
    .contract-preview { box-shadow: none; border-radius: 0; padding: 20px; }
  }
</style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e8c547">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BQ Tools">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
</head>
<body>

<nav class="nav">
  <a href="/home.html" class="nav-logo">BQ <span>Tools</span></a>
  <div class="nav-right">
    <a href="/home.html" class="nav-link" data-en="Tools" data-es="Herramientas" data-he="כלים">Tools</a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="he" onclick="setLang('he')">עב</button>
    </div>
  </div>
</nav>

<div class="page">
  <a href="/home.html" class="page-back" data-en="← All Tools" data-es="← Todas las Herramientas" data-he="כל הכלים →">← All Tools</a>
  <h1 class="page-title" data-en="📜 Contract Generator" data-he="📜 מחולל חוזים">📜 Contract Generator</h1>
  <p class="page-sub" data-en="Generate professional California-compliant construction contracts using YOUR style." data-he="צור חוזי בנייה מקצועיים לקליפורניה בסגנון שלך.">Generate professional California-compliant construction contracts using YOUR style.</p>

  <div class="card" style="margin-bottom:14px;">
    <label class="input-label" data-en="Client Name" data-es="Nombre del Cliente" data-he="שם הלקוח">Client Name</label>
    <input class="input" id="clientName" placeholder="John Smith" style="margin-bottom:10px;">

    <label class="input-label" data-en="Client Address" data-es="Dirección del Cliente" data-he="כתובת הלקוח">Client Address</label>
    <input class="input" id="clientAddress" placeholder="123 Main St, Los Angeles, CA 90001" style="margin-bottom:10px;">

    <label class="input-label" data-en="Project Description" data-es="Descripción del Proyecto" data-he="תיאור הפרויקט">Project Description</label>
    <textarea class="textarea" id="projectDesc" placeholder="Complete kitchen remodel including demolition, new cabinets, quartz countertops, tile backsplash, LVP flooring, recessed lighting, and all related electrical and plumbing work." rows="4"></textarea>

    <div style="display:flex;gap:10px;margin-top:10px;">
      <div style="flex:1;">
        <label class="input-label" data-en="Start Date" data-es="Fecha de Inicio" data-he="תאריך התחלה">Start Date</label>
        <input class="input" id="startDate" type="date">
      </div>
      <div style="flex:1;">
        <label class="input-label" data-en="End Date" data-es="Fecha de Fin" data-he="תאריך סיום">End Date</label>
        <input class="input" id="endDate" type="date">
      </div>
    </div>

    <label class="input-label" style="margin-top:10px;" data-en="Total Amount ($)" data-es="Monto Total ($)" data-he="סכום כולל ($)">Total Amount ($)</label>
    <input class="input" id="amount" type="number" placeholder="25000">

    <label class="input-label" style="margin-top:10px;" data-en="Payment Terms" data-es="Términos de Pago" data-he="תנאי תשלום">Payment Terms</label>
    <input class="input" id="paymentTerms" placeholder="30% deposit, 40% mid-project, 30% on completion">
  </div>

  <button class="btn btn-primary btn-large" style="width:100%;" onclick="generateContract()" id="genBtn">
    📜 <span data-en="Generate Contract ⚡2" data-es="Generar Contrato ⚡2" data-he="צור חוזה ⚡2">Generate Contract ⚡2</span>
  </button>

  <div class="contract-preview" id="preview"></div>
  <div class="cp-actions" id="actions" style="display:none;">
    <button class="btn" onclick="window.print()">🖨️ <span data-en="Print / PDF" data-es="Imprimir / PDF" data-he="הדפס / PDF">Print / PDF</span></button>
    <button class="btn" onclick="emailContract()">📧 <span data-en="Email" data-es="Enviar por Email" data-he="מייל">Email</span></button>
  </div>
</div>

<div style="margin:16px auto;max-width:760px;padding:0 16px;font-size:11px;color:var(--txd);text-align:center;line-height:1.5;">
  ⚠️ <span data-en="AI-generated contracts are templates only. Have a licensed California attorney review before signing." data-he="חוזים שנוצרים ע״י AI הם תבניות בלבד. בקש מעורך דין מורשה בקליפורניה לסקור לפני חתימה.">AI-generated contracts are templates only. Have a licensed California attorney review before signing.</span>
</div>

<script src="../js/ai.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/crypto.js"></script>
<script src="../js/common.js"></script>
<script>
if (!isLoggedIn()) window.location.replace('/auth.html');

let currentContract = null;

async function generateContract() {
  const desc = document.getElementById('projectDesc').value.trim();
  const amount = document.getElementById('amount').value.trim();
  if (!desc || !amount) { showToast(lang === 'he' ? 'מלא תיאור וסכום' : 'Fill description and amount', 'err'); return; }

  const credits = getCredits();
  if (credits < 2) { showNoCreditModal(); return; }

  const ok = await confirmCredit(lang === 'he' ? 'יצירת חוזה (2 קרדיטים)' : 'Generate Contract (2 credits)');
  if (!ok) return;

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ ' + (lang === 'he' ? 'מייצר...' : 'Generating...');

  try {
    const data = await apiCall('/api/contracts/generate', {
      method: 'POST',
      body: {
        clientName: document.getElementById('clientName').value.trim(),
        clientAddress: document.getElementById('clientAddress').value.trim(),
        projectDescription: desc,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        amount: parseFloat(amount),
        paymentTerms: document.getElementById('paymentTerms').value.trim()
      }
    });

    currentContract = data.contract;
    renderContract(currentContract);
    document.getElementById('actions').style.display = 'flex';

    const user = getCachedUser();
    if (user && data.credits !== undefined) {
      user.credits = data.credits;
      setCachedUser(user);
      if (typeof updateCreditDisplay === 'function') updateCreditDisplay();
    }

    showToast(lang === 'he' ? '✓ חוזה נוצר' : '✓ Contract generated', 'ok');
    document.getElementById('preview').scrollIntoView({ behavior: 'smooth' });
  } catch (err) {
    showToast(err.message, 'err');
  }

  btn.disabled = false;
  btn.innerHTML = '📜 <span>' + (lang === 'he' ? 'צור חוזה ⚡2' : 'Generate Contract ⚡2') + '</span>';
}

function renderContract(c) {
  const user = getCachedUser() || {};
  const h = lang === 'he';
  const client = document.getElementById('clientName').value.trim() || '[Client Name]';
  const clientAddr = document.getElementById('clientAddress').value.trim() || '';
  const amount = document.getElementById('amount').value.trim();
  const startDate = document.getElementById('startDate').value || 'TBD';
  const endDate = document.getElementById('endDate').value || 'TBD';

  const preview = document.getElementById('preview');
  preview.innerHTML = `
    <div class="cp-header">
      <h1>${c.title || 'CONSTRUCTION AGREEMENT'}</h1>
      <p>Date: ${new Date().toLocaleDateString()}</p>
    </div>

    <div class="cp-parties">
      <div class="cp-party">
        <div class="p-label">Contractor</div>
        <div class="p-name">${escHtml(user.businessName || 'Your Business')}</div>
        <div>${escHtml(user.email || '')}</div>
        ${user.phone ? `<div>${escHtml(user.phone)}</div>` : ''}
      </div>
      <div class="cp-party">
        <div class="p-label">Client</div>
        <div class="p-name">${escHtml(client)}</div>
        <div>${escHtml(clientAddr)}</div>
      </div>
    </div>

    <div class="cp-section"><h2>1. Scope of Work</h2><p>${escHtml(c.scope || '')}</p></div>
    <div class="cp-section"><h2>2. Timeline</h2><p>Start: ${startDate} · Completion: ${endDate}<br>${escHtml(c.timeline || '')}</p></div>
    <div class="cp-section"><h2>3. Payment ($${parseFloat(amount).toLocaleString()})</h2><p>${escHtml(c.payment || '')}</p></div>
    <div class="cp-section"><h2>4. Materials</h2><p>${escHtml(c.materials || '')}</p></div>
    <div class="cp-section"><h2>5. Change Orders</h2><p>${escHtml(c.changeOrders || '')}</p></div>
    <div class="cp-section"><h2>6. Warranty</h2><p>${escHtml(c.warranty || '')}</p></div>
    <div class="cp-section"><h2>7. Termination</h2><p>${escHtml(c.termination || '')}</p></div>
    <div class="cp-section"><h2>8. Dispute Resolution</h2><p>${escHtml(c.disputes || '')}</p></div>

    <div class="cp-sign">
      <div class="cp-sign-block">
        <div class="s-line"></div>
        <div class="s-label">Contractor: ${escHtml(user.businessName || '')}</div>
        <div class="s-label">Date: _________________</div>
      </div>
      <div class="cp-sign-block">
        <div class="s-line"></div>
        <div class="s-label">Client: ${escHtml(client)}</div>
        <div class="s-label">Date: _________________</div>
      </div>
    </div>

    <div class="cp-footer">Powered by BQ Tools · California Construction Agreement</div>
  `;
  preview.classList.add('show');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function emailContract() {
  const client = document.getElementById('clientName').value.trim() || 'Client';
  const subject = encodeURIComponent('Construction Agreement');
  const body = encodeURIComponent(`Hi ${client},\n\nPlease find your construction agreement attached.\n\nPlease review and sign.\n\nBest,\n${(getCachedUser() || {}).businessName || ''}`);
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}
</script>
</body>
</html>
