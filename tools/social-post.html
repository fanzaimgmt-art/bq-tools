<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BQ Tools — Social Post Generator</title>
<link rel="stylesheet" href="../style.css">
<style>
  body { display: flex; flex-direction: column; }
  .platform-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .plat-btn {
    padding: 10px 20px; border: 1px solid var(--bd); border-radius: 8px;
    background: var(--sf); color: var(--txd); font-family: var(--font-en);
    font-size: 14px; cursor: pointer; transition: all .2s; min-height: 48px;
  }
  .plat-btn.on { border-color: var(--ac); color: var(--ac); background: var(--acd); }
  .plat-btn:hover { border-color: var(--ac); }

  .result-card {
    background: var(--sf); border: 1px solid var(--bd); border-radius: 12px;
    padding: 20px; margin-top: 16px; display: none;
  }
  .result-card.on { display: block; animation: fadeIn .3s; }
  .result-card h3 { font-size: 14px; color: var(--ac); margin-bottom: 12px; }
  .caption-box {
    background: var(--bg); border-radius: 8px; padding: 14px;
    font-size: 14px; line-height: 1.7; white-space: pre-wrap; margin-bottom: 12px;
    user-select: text; -webkit-user-select: text;
  }
  .hashtags {
    font-size: 13px; color: var(--blu); margin-bottom: 12px;
    user-select: text; -webkit-user-select: text;
  }
  .upload-area {
    border: 2px dashed var(--bd); border-radius: 10px; padding: 24px;
    text-align: center; cursor: pointer; transition: all .2s;
    position: relative; background: var(--sf); margin-bottom: 12px;
  }
  .upload-area:hover { border-color: var(--ac); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-area img { max-height: 200px; border-radius: 8px; }
</style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e8c547">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BQ Tools">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">BQ <span>Tools</span></a>
  <div class="nav-right">
    <a href="/" class="nav-link" data-en="← Back" data-es="← Atrás" data-he="חזור →">← Back</a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="he" onclick="setLang('he')">עב</button>
    </div>
  </div>
</nav>

<div class="page">
  <a href="/" class="page-back" data-en="← All Tools" data-es="← Todas las Herramientas" data-he="כל הכלים →">← All Tools</a>
  <h1 class="page-title" data-en="📱 Social Post Generator" data-he="📱 מחולל פוסטים">📱 Social Post Generator</h1>
  <p class="page-sub" data-en="Upload a before/after, pick your platform, get a ready-to-post caption." data-es="Sube un antes/después, elige tu plataforma, obtén un texto listo para publicar." data-he="העלה לפני/אחרי, בחר פלטפורמה, קבל קפשן מוכן לפרסום.">Upload a before/after, pick your platform, get a ready-to-post caption.</p>

  <div id="hiw-social-post"></div>
  <script>document.addEventListener('DOMContentLoaded',()=>{if(typeof buildHowItWorks==='function')buildHowItWorks('hiw-social-post',HIW_CONFIGS['social-post'])});</script>

  <div class="card" style="margin-bottom:14px;">
    <label class="input-label" data-en="Upload Before/After Photo" data-es="Sube Foto de Antes/Después" data-he="העלה תמונת לפני/אחרי">Upload Photo</label>
    <div class="upload-area" id="uploadArea">
      <span id="uploadText" data-en="Click or drag to upload" data-he="לחץ או גרור להעלאה">Click or drag to upload</span>
      <input type="file" accept="image/*" id="photoInput">
    </div>

    <label class="input-label" data-en="What work was done?" data-he="מה בוצע?">What work was done?</label>
    <input class="input" id="workDesc" placeholder="Bathroom renovation - new tile, vanity, and fixtures" style="margin-bottom:14px;">

    <label class="input-label" data-en="Platform" data-es="Plataforma" data-he="פלטפורמה">Platform</label>
    <div class="platform-btns">
      <button class="plat-btn on" onclick="setPlatform(this, 'instagram')">Instagram</button>
      <button class="plat-btn" onclick="setPlatform(this, 'facebook')">Facebook</button>
      <button class="plat-btn" onclick="setPlatform(this, 'linkedin')">LinkedIn</button>
    </div>
  </div>

  <button class="btn btn-primary btn-large" style="width:100%;" onclick="generatePost()" id="genBtn" data-en="🧠 Generate Caption" data-he="🧠 צור קפשן">🧠 Generate Caption</button>

  <div class="result-card" id="resultCard">
    <h3 data-en="Your Caption" data-he="הקפשן שלך">Your Caption</h3>
    <div class="caption-box" id="captionBox"></div>
    <div class="hashtags" id="hashtagBox"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
      <button class="btn btn-primary" style="flex:1;" onclick="copyCaption()" data-en="📋 Copy Caption" data-he="📋 העתק">📋 Copy Caption</button>
      <button class="btn" style="flex:1;" onclick="generatePromoImage()" id="promoBtn" data-en="🎨 Generate Image (5 cr)" data-he="🎨 צור תמונה (5 קר)">🎨 Generate Image (5 cr)</button>
    </div>
    <div id="promoResult" style="margin-top:12px;display:none;">
      <img id="promoImg" style="max-width:100%;border-radius:12px;border:1px solid var(--bd);" alt="Promo image">
      <div style="margin-top:8px;">
        <a id="promoDownload" class="btn" download="bq-promo.png" data-en="⬇️ Download" data-he="⬇️ הורד">⬇️ Download</a>
      </div>
    </div>
  </div>
</div>

<footer class="footer"><div class="footer-brand">Powered by BQ Tools — BQ Production LLC</div></footer>

<script src="../js/auth.js"></script>
<script src="../js/crypto.js"></script>
<script src="../js/ai.js"></script>
<script src="../js/common.js"></script>
<script src="../js/assistant.js"></script>
<script>
let platform = 'instagram';
let photoSrc = null;

function setPlatform(el, p) {
  platform = p;
  document.querySelectorAll('.plat-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

function handlePhotoUpload(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    photoSrc = ev.target.result;
    document.getElementById('uploadArea').innerHTML = `<img src="${photoSrc}"><input type="file" accept="image/*" id="photoInput">`;
    document.getElementById('photoInput').addEventListener('change', handlePhotoUpload);
  };
  r.readAsDataURL(f);
}
document.getElementById('photoInput').addEventListener('change', handlePhotoUpload);

async function generatePost() {
  if (!requirePro()) return;

  const desc = document.getElementById('workDesc').value.trim();
  if (!desc) { showToast(lang === 'he' ? 'תאר את העבודה' : 'Describe the work', 'err'); return; }

  const ok = await confirmCredit(lang === 'he' ? 'פוסט חברתי' : 'Social Post');
  if (!ok) return;

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = '⏳...';

  try {
    const images = [];
    if (photoSrc) {
      images.push(await resizeForAPI(photoSrc));
    }

    const prompt = `You are a social media expert for construction contractors. Write a ${platform} post for this project:

Work: ${desc}
Platform: ${platform}

Requirements:
- Start with a strong hook (first line must grab attention)
- Professional but relatable tone
- Include a clear CTA (call to action)
- ${platform === 'instagram' ? '15-20 relevant hashtags' : platform === 'linkedin' ? '5-8 professional hashtags' : '5-10 hashtags'}

Respond JSON only:
{"caption": "the full caption text", "hashtags": "#tag1 #tag2 ..."}`;

    const text = await callWorkerAI('social-post', prompt, images, desc.substring(0, 50));
    const result = parseAIJSON(text);

    document.getElementById('captionBox').textContent = result.caption;
    document.getElementById('hashtagBox').textContent = result.hashtags;
    document.getElementById('resultCard').classList.add('on');
    showToast(lang === 'he' ? 'קפשן מוכן!' : 'Caption ready!', 'ok');

  } catch(err) {
    showToast('Error: ' + err.message, 'err');
  }

  btn.disabled = false;
  btn.textContent = lang === 'he' ? '🧠 צור קפשן' : '🧠 Generate Caption';
}

function copyCaption() {
  const text = document.getElementById('captionBox').textContent + '\n\n' + document.getElementById('hashtagBox').textContent;
  navigator.clipboard.writeText(text)
    .then(() => showToast(lang === 'he' ? 'הועתק!' : 'Copied!', 'ok'))
    .catch(() => showToast(lang === 'he' ? 'לא ניתן להעתיק' : 'Could not copy', 'err'));
}

let spTaskId = null;
let spPollInterval = null;

async function generatePromoImage() {
  if (!requirePro()) return;

  const ok = await confirmCredit(lang === 'he' ? 'תמונת פרומו' : 'Generate Visual', 5);
  if (!ok) return;

  const btn = document.getElementById('promoBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Generating...';
  document.getElementById('promoResult').style.display = 'none';

  // Guard against double-tap leaking a previous interval
  if (spPollInterval) { clearInterval(spPollInterval); spPollInterval = null; }

  const desc = document.getElementById('workDesc').value.trim();
  const photoB64 = photoSrc ? photoSrc.split(',')[1] : null;

  const prompt = `Professional construction company promotional photo for ${platform}, ${desc}. ` +
    `Stunning before/after remodel photography, dramatic lighting, magazine quality, highly detailed, photorealistic.`;

  try {
    const body = { prompt, width: 1024, height: 1024 };
    if (photoB64) body.referenceImage = photoB64;

    const data = await apiCall('/api/nanobanana/generate', { method: 'POST', body });
    spTaskId = data.taskId;
    spPollInterval = setInterval(pollPromo, 4000);
  } catch (err) {
    showToast('Error: ' + err.message, 'err');
    btn.disabled = false;
    btn.textContent = '🎨 Generate Image (5 cr)';
  }
}

async function pollPromo() {
  if (!spTaskId) return;
  try {
    const data = await apiCall('/api/nanobanana/status?taskId=' + spTaskId);
    if (data.status === 'completed' && data.imageUrl) {
      clearInterval(spPollInterval);
      document.getElementById('promoImg').src = data.imageUrl;
      document.getElementById('promoDownload').href = data.imageUrl;
      document.getElementById('promoResult').style.display = 'block';
      const btn = document.getElementById('promoBtn');
      btn.disabled = false;
      btn.textContent = btn.getAttribute('data-' + lang) || btn.getAttribute('data-en') || '🎨 Generate Image (5 cr)';
      showToast('Image ready!', 'ok');
    } else if (data.status === 'failed') {
      clearInterval(spPollInterval);
      showToast('Image generation failed', 'err');
      const btn = document.getElementById('promoBtn');
      btn.disabled = false;
      btn.textContent = btn.getAttribute('data-' + lang) || btn.getAttribute('data-en') || '🎨 Generate Image (5 cr)';
    }
  } catch (err) {
    clearInterval(spPollInterval);
    showToast('Poll error: ' + err.message, 'err');
  }
}
</script>
</body>
</html>
