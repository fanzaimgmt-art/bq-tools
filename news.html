<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BQ Tools — Daily News</title>
<link rel="stylesheet" href="style.css">
<style>
  body { display: flex; flex-direction: column; }

  .news-header { margin-bottom: 20px; }
  .news-header h1 { font-size: 26px; font-weight: 900; margin-bottom: 4px; }
  .news-header h1 .accent { color: var(--ac); }
  .news-header .news-date { font-size: 13px; color: var(--txd); }

  /* Tabs */
  .news-tabs {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
    margin-bottom: 20px; -webkit-overflow-scrolling: touch;
  }
  .news-tab {
    padding: 8px 14px; border: 1px solid var(--bd); border-radius: 10px;
    background: var(--sf); color: var(--txd); font-family: 'Heebo', sans-serif;
    font-size: 13px; cursor: pointer; white-space: nowrap; transition: all .15s;
    min-height: 40px; display: flex; align-items: center; gap: 4px;
  }
  .news-tab:hover { border-color: var(--ac); color: var(--ac); }
  .news-tab.on { background: var(--acd); border-color: var(--ac); color: var(--ac); font-weight: 700; }
  .news-tab .tab-icon { font-size: 15px; }
  .news-tab .tab-count {
    background: var(--ac); color: var(--bg); font-size: 10px; font-weight: 700;
    padding: 1px 6px; border-radius: 6px; min-width: 16px; text-align: center;
  }

  /* News cards */
  .news-grid { display: flex; flex-direction: column; gap: 12px; }

  .news-card {
    background: var(--sf); border: 1px solid var(--bd); border-radius: 14px;
    padding: 18px; transition: all .2s; display: flex; gap: 14px;
  }
  .news-card:hover { border-color: var(--ac); }
  .news-card-img {
    width: 80px; height: 80px; border-radius: 10px; background: var(--bg);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: var(--txd); overflow: hidden;
  }
  .news-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .news-card-body { flex: 1; min-width: 0; }
  .news-card-title {
    font-size: 15px; font-weight: 700; margin-bottom: 4px; line-height: 1.4;
  }
  .news-card-summary {
    font-size: 13px; color: var(--txd); line-height: 1.6; margin-bottom: 8px;
  }
  .news-card-meta {
    display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--txd);
  }
  .news-card-source {
    background: var(--bg); padding: 2px 8px; border-radius: 6px; font-weight: 600;
  }
  .news-card-rating { color: var(--ac); font-weight: 700; }
  .news-card-link {
    color: var(--ac); text-decoration: none; font-weight: 600; font-size: 12px;
    margin-left: auto;
  }
  .news-card-link:hover { text-decoration: underline; opacity: 1; }

  /* Empty / Loading */
  .news-empty {
    text-align: center; padding: 40px 20px; color: var(--txd);
  }
  .news-empty .icon { font-size: 48px; margin-bottom: 12px; }
  .news-empty p { font-size: 14px; line-height: 1.6; }

  .news-loading {
    text-align: center; padding: 40px; color: var(--txd); font-size: 14px;
  }
  .news-loading .spinner {
    display: inline-block; width: 24px; height: 24px; border: 3px solid var(--bd);
    border-top-color: var(--ac); border-radius: 50%; animation: spin .8s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Archive */
  .news-archive {
    margin-top: 20px; display: flex; align-items: center; gap: 8px;
  }
  .news-archive input {
    padding: 8px 12px; border: 1px solid var(--bd); border-radius: 8px;
    background: var(--bg); color: var(--tx); font-family: 'Heebo', sans-serif;
    font-size: 14px; min-height: 40px;
  }
  .news-archive input:focus { outline: none; border-color: var(--ac); }

  @media (max-width: 600px) {
    .news-card { flex-direction: column; }
    .news-card-img { width: 100%; height: 140px; }
    .news-header h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="/home.html" class="nav-logo">BQ <span>Tools</span></a>
  <div class="nav-right">
    <a href="/home.html" class="nav-link" data-en="Tools" data-he="כלים">Tools</a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="he" onclick="setLang('he')">עב</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="news-header">
    <h1>📰 <span data-en="What's New Today" data-he="מה חדש היום" class="accent">What's New Today</span></h1>
    <span class="news-date" id="newsDate"></span>
  </div>

  <!-- Tabs -->
  <div class="news-tabs" id="newsTabs"></div>

  <!-- Content -->
  <div class="news-grid" id="newsGrid">
    <div class="news-loading">
      <div class="spinner"></div>
      <p data-en="Loading news..." data-he="טוען חדשות...">Loading news...</p>
    </div>
  </div>

  <!-- Archive -->
  <div class="news-archive">
    <span style="font-size:13px;color:var(--txd);" data-en="Archive:" data-he="ארכיון:">Archive:</span>
    <input type="date" id="archiveDate" onchange="loadArchive()">
  </div>
</div>

<script src="js/ai.js"></script>
<script src="js/auth.js"></script>
<script src="js/crypto.js"></script>
<script src="js/common.js"></script>
<script>
let newsData = null;
let activeTab = 'industry';

const CATEGORY_ICONS = {
  industry: '🗞️', shops: '🏪', products: '🔧', tech: '🤖',
  law: '📋', jobs: '👷', tips: '💡'
};

async function loadNews(dateParam) {
  const grid = document.getElementById('newsGrid');
  grid.innerHTML = '<div class="news-loading"><div class="spinner"></div><p>Loading...</p></div>';

  try {
    const endpoint = dateParam ? `/api/news/archive?date=${dateParam}` : '/api/news/today';
    const data = await apiCall(endpoint);

    if (!data.news) {
      grid.innerHTML = `<div class="news-empty">
        <div class="icon">📰</div>
        <p data-en="No news yet. The daily update runs at 8am PT.<br>Check back soon!" data-he="אין חדשות עדיין. העדכון היומי רץ ב-8 בבוקר.<br>חזור בקרוב!">${lang === 'he' ? 'אין חדשות עדיין. העדכון היומי רץ ב-8 בבוקר.<br>חזור בקרוב!' : 'No news yet. The daily update runs at 8am PT.<br>Check back soon!'}</p>
      </div>`;
      return;
    }

    newsData = data.news;
    document.getElementById('newsDate').textContent = newsData.date;

    // Mark as visited
    localStorage.setItem('bq_news_last_visit', newsData.date);

    buildTabs();
    renderCategory(activeTab);
  } catch (err) {
    grid.innerHTML = `<div class="news-empty">
      <div class="icon">❌</div>
      <p>${err.message || 'Failed to load news'}</p>
    </div>`;
  }
}

function buildTabs() {
  const tabs = document.getElementById('newsTabs');
  if (!newsData || !newsData.categories) return;

  tabs.innerHTML = Object.entries(newsData.categories).map(([id, cat]) => {
    const count = cat.items ? cat.items.length : 0;
    const on = id === activeTab ? ' on' : '';
    return `<button class="news-tab${on}" onclick="selectTab('${id}')">
      <span class="tab-icon">${cat.icon || CATEGORY_ICONS[id] || '📰'}</span>
      ${cat.label}
      <span class="tab-count">${count}</span>
    </button>`;
  }).join('');
}

function selectTab(id) {
  activeTab = id;
  buildTabs();
  renderCategory(id);
}

function renderCategory(id) {
  const grid = document.getElementById('newsGrid');
  if (!newsData || !newsData.categories || !newsData.categories[id]) {
    grid.innerHTML = '<div class="news-empty"><div class="icon">📭</div><p>No content in this category</p></div>';
    return;
  }

  const cat = newsData.categories[id];
  const items = cat.items || [];
  const h = lang === 'he';

  if (items.length === 0) {
    grid.innerHTML = '<div class="news-empty"><div class="icon">📭</div><p>No items yet</p></div>';
    return;
  }

  grid.innerHTML = items.map(item => {
    const icon = cat.icon || CATEGORY_ICONS[id] || '📰';
    const imgHtml = item.image
      ? `<img src="${escHtml(item.image)}" alt="">`
      : icon;
    const ratingHtml = item.rating
      ? `<span class="news-card-rating">⭐ ${escHtml(item.rating)}</span>`
      : '';
    const linkHtml = item.url
      ? `<a href="${escHtml(item.url)}" target="_blank" rel="noopener" class="news-card-link">${h ? 'קרא עוד →' : 'Read more →'}</a>`
      : '';

    return `<div class="news-card">
      <div class="news-card-img">${imgHtml}</div>
      <div class="news-card-body">
        <div class="news-card-title">${escHtml(item.title || '')}</div>
        <div class="news-card-summary">${escHtml(item.summary || '')}</div>
        <div class="news-card-meta">
          <span class="news-card-source">${escHtml(item.source || 'BQ Tools')}</span>
          ${ratingHtml}
          ${linkHtml}
        </div>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function loadArchive() {
  const date = document.getElementById('archiveDate').value;
  if (date) loadNews(date);
}

// Init
loadNews();
</script>
</body>
</html>
