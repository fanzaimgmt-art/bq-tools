<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BQ Tools — Project Gallery</title>
<link rel="stylesheet" href="style.css">
<style>
  body { display: flex; flex-direction: column; }

  .gallery-stats {
    display: flex; gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    flex: 1; background: var(--sf); border: 1px solid var(--bd); border-radius: 10px;
    padding: 14px; text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 900; color: var(--ac); }
  .stat-label { font-size: 12px; color: var(--txd); margin-top: 2px; }

  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 14px; border: 1px solid var(--bd); border-radius: 8px;
    background: var(--sf); color: var(--txd); font-family: 'Heebo', sans-serif;
    font-size: 13px; cursor: pointer; transition: all .2s; min-height: 40px;
  }
  .filter-btn.on { border-color: var(--ac); color: var(--ac); background: var(--acd); }
  .filter-btn:hover:not(.on) { border-color: var(--ac); }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .gallery-card {
    background: var(--sf); border: 1px solid var(--bd); border-radius: 12px;
    overflow: hidden; cursor: pointer; transition: all .2s;
  }
  .gallery-card:hover { border-color: var(--ac); transform: translateY(-2px); }
  .gallery-thumb {
    width: 100%; aspect-ratio: 4/3; object-fit: cover;
  }
  .gallery-thumb-placeholder {
    width: 100%; aspect-ratio: 4/3; background: var(--bg);
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .gallery-info { padding: 10px; }
  .gallery-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .gallery-date { font-size: 13px; color: var(--txd); }
  .gallery-type {
    font-size: 11px; color: var(--ac); margin-top: 4px;
    background: var(--acd); padding: 2px 8px; border-radius: 4px; display: inline-block;
  }

  .empty-state {
    text-align: center; padding: 60px 20px;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: .3; }
  .empty-state h3 { color: var(--txd); font-size: 18px; margin-bottom: 8px; }
  .empty-state p { color: var(--txd); font-size: 14px; }

  .detail-imgs { display: flex; gap: 8px; margin-bottom: 12px; }
  .detail-imgs img { flex: 1; max-width: 50%; border-radius: 8px; }

  .export-bar {
    display: flex; gap: 8px; margin-bottom: 16px; justify-content: end;
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">BQ <span>Tools</span></a>
  <div class="nav-right">
    <a href="/" class="nav-link" data-en="← Home" data-he="בית →">← Home</a>
    <div class="credit-bar" id="creditBar" style="display:none;">
      <span>⚡</span><span class="credit-count">0</span>
    </div>
    <a href="/auth.html" class="btn btn-sm" id="navAuthBtn" data-en="Login" data-he="התחבר">Login</a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="he" onclick="setLang('he')">עב</button>
    </div>
  </div>
</nav>

<div class="page">
  <h1 class="page-title" data-en="Project Gallery" data-he="גלריית פרויקטים">Project Gallery</h1>
  <p class="page-sub" data-en="All your saved projects in one place." data-he="כל הפרויקטים השמורים שלך במקום אחד.">All your saved projects in one place.</p>

  <div class="gallery-stats" id="statsRow">
    <div class="stat-card">
      <div class="stat-num" id="projCount">0</div>
      <div class="stat-label" data-en="Projects" data-he="פרויקטים">Projects</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="creditCount">0</div>
      <div class="stat-label" data-en="Credits" data-he="קרדיטים">Credits</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statusBadge">Free</div>
      <div class="stat-label" data-en="Plan" data-he="תוכנית">Plan</div>
    </div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn on" onclick="filterBy('all')" data-filter="all" data-en="All" data-he="הכל">All</button>
    <button class="filter-btn" onclick="filterBy('compare')" data-filter="compare">Compare</button>
    <button class="filter-btn" onclick="filterBy('report')" data-filter="report">Report</button>
    <button class="filter-btn" onclick="filterBy('estimate')" data-filter="estimate">Estimate</button>
    <button class="filter-btn" onclick="filterBy('social')" data-filter="social">Social</button>
  </div>

  <div id="galleryContent"></div>
</div>

<footer class="footer"><div class="footer-brand">Powered by BQ Tools — BQ Production LLC</div></footer>

<script src="js/ai.js"></script>
<script src="js/auth.js"></script>
<script src="js/crypto.js"></script>
<script src="js/common.js"></script>
<script src="js/assistant.js"></script>
<script>
let allProjects = [];
let activeFilter = 'all';

// Update nav
if (isLoggedIn()) {
  const btn = document.getElementById('navAuthBtn');
  if (isPro()) { btn.textContent = 'PRO'; btn.classList.add('btn-pro-active'); }
  else { btn.textContent = lang === 'he' ? 'חשבון' : 'Account'; }
  btn.href = '/auth.html';
  updateCreditDisplay();
}

async function loadGallery() {
  // Load from localStorage first (fast)
  const local = JSON.parse(localStorage.getItem('bq_gallery') || '[]');

  // Try server
  let serverProjects = [];
  if (isLoggedIn()) {
    try {
      serverProjects = await getProjectsFromServer();
    } catch {}
  }

  // Merge: server projects + local-only projects
  allProjects = serverProjects.length > 0 ? serverProjects : local.map(p => ({
    id: p.id,
    date: p.date,
    tool: p.type || 'compare',
    title: 'Compare Project',
    thumbnail: '',
    result_summary: ''
  }));

  renderGallery();
}

function renderGallery() {
  const filtered = activeFilter === 'all'
    ? allProjects
    : allProjects.filter(p => p.tool === activeFilter);

  const container = document.getElementById('galleryContent');
  document.getElementById('projCount').textContent = allProjects.length;

  const user = getCachedUser();
  document.getElementById('creditCount').textContent = user ? user.credits : 0;
  document.getElementById('statusBadge').textContent = isPro() ? 'PRO' : 'Free';
  document.getElementById('statusBadge').style.color = isPro() ? 'var(--ac)' : 'var(--txd)';

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📁</div>
        <h3 data-en="No projects yet" data-he="אין פרויקטים עדיין">No projects yet</h3>
        <p data-en="Use the Compare tool and click 'Save to Gallery' to start building your portfolio." data-he="השתמש בכלי ההשוואה ולחץ 'שמור לגלריה' כדי להתחיל לבנות את הפורטפוליו שלך.">Use the Compare tool and click 'Save to Gallery' to start building your portfolio.</p>
        <a href="/tools/compare.html" class="btn btn-primary" style="margin-top:16px;" data-en="Open Compare Tool" data-he="פתח כלי השוואה">Open Compare Tool</a>
      </div>`;
    setLang(lang);
    return;
  }

  const toolIcons = { compare: '🔀', report: '📄', estimate: '💰', social: '📱', review: '⭐', sketch: '✏️' };

  let html = '<div class="gallery-grid">';
  filtered.forEach((p, i) => {
    const dateStr = p.date ? new Date(p.date).toLocaleDateString() : '';
    html += `
      <div class="gallery-card" onclick="openProject(${i})">
        ${p.thumbnail
          ? `<img class="gallery-thumb" src="data:image/jpeg;base64,${p.thumbnail}" loading="lazy">`
          : `<div class="gallery-thumb-placeholder">${toolIcons[p.tool] || '📁'}</div>`}
        <div class="gallery-info">
          <div class="gallery-title">${p.title || p.tool || 'Project'}</div>
          <div class="gallery-date">${dateStr}</div>
          <div class="gallery-type">${p.tool || 'compare'}</div>
        </div>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
  setLang(lang);
}

function filterBy(type) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.filter === type);
  });
  renderGallery();
}

function openProject(idx) {
  const filtered = activeFilter === 'all'
    ? allProjects
    : allProjects.filter(p => p.tool === activeFilter);
  const p = filtered[idx];
  if (!p) return;

  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.innerHTML = `
    <div class="modal-card" style="max-width:500px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="color:var(--ac);">${p.title || 'Project'}</h3>
        <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;color:var(--txd);font-size:20px;cursor:pointer;width:48px;height:48px;">✕</button>
      </div>
      ${p.thumbnail ? `<img src="data:image/jpeg;base64,${p.thumbnail}" style="width:100%;border-radius:8px;margin-bottom:12px;">` : ''}
      <div style="font-size:14px;color:var(--txd);margin-bottom:8px;">${new Date(p.date).toLocaleDateString()} — ${p.tool}</div>
      ${p.result_summary ? `<div style="font-size:14px;padding:10px;background:var(--bg);border-radius:8px;">${p.result_summary}</div>` : ''}
      <div style="display:flex;gap:8px;margin-top:12px;">
        <a href="/tools/${p.tool === 'compare' ? 'compare' : p.tool}.html" class="btn" style="flex:1;" data-en="Open Tool" data-he="פתח כלי">Open Tool</a>
      </div>
    </div>`;
  document.body.appendChild(m);
  requestAnimationFrame(() => m.classList.add('open'));
  m.onclick = (e) => { if (e.target === m) m.remove(); };
  setLang(lang);
}

loadGallery();
</script>
</body>
</html>
