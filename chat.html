<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BQ Tools — AI Chat</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
/* ── Design tokens ── */
:root {
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --model-haiku:#5ED37F; --model-sonnet:#5B9DFF; --model-opus:#B87BFF;
  --model-gpt:#19C2A7; --model-gemini:#F2A24A; --model-llama:#E84A5F; --model-manus:#FF6B6B;
}
body { display:flex; flex-direction:column; height:100vh; overflow:hidden; -webkit-font-smoothing:antialiased; }
.chat-wrap { flex:1; display:flex; overflow:hidden; }

  /* ── Sidebar ── */
  .chat-sidebar {
    width:260px; background:var(--sf); border-right:1px solid var(--bd);
    display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
  }
  /* Brand row */
  .sidebar-brand { display:flex; align-items:center; gap:10px; padding:14px 16px 10px; }
  .brand-mark {
    width:26px; height:26px; border-radius:7px;
    background:linear-gradient(135deg,var(--ac),#c9a800);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:11px;
    color:var(--bg); box-shadow:0 2px 8px rgba(232,197,71,.22); flex-shrink:0;
  }
  .brand-name { font-family:var(--font-display); font-weight:600; font-size:15px; letter-spacing:-.01em; color:var(--tx); }
  .brand-name .dim { color:var(--txd); font-weight:500; }
  /* Search */
  .sidebar-search {
    margin:0 12px 8px; display:flex; align-items:center; gap:7px;
    padding:6px 10px; background:var(--bg); border:1px solid var(--bd); border-radius:8px;
  }
  .sidebar-search input { flex:1; background:none; border:none; outline:none; color:var(--tx); font-size:13px; font-family:inherit; }
  .sidebar-search input::placeholder { color:var(--txd); }
  /* New chat button */
  .memory-import-link {
    display:flex; align-items:center; gap:8px; margin:0 12px 4px;
    padding:8px 10px; border:1px dashed rgba(232,197,71,.25); border-radius:8px;
    font-size:12px; color:var(--txd); text-decoration:none;
    background:var(--acd); transition:all .15s;
  }
  .memory-import-link:hover { border-color:var(--ac); color:var(--ac); }
  .memory-import-link span { flex:1; }
  .chat-sidebar .new-chat-btn {
    margin:0 12px 8px; padding:9px 12px; border-radius:9px; border:none;
    background:var(--ac); color:var(--bg); font-family:var(--font-display);
    font-size:13px; font-weight:700; cursor:pointer; min-height:36px;
    display:flex; align-items:center; justify-content:space-between;
    transition:filter .15s; box-shadow:0 2px 8px rgba(232,197,71,.2);
  }
  .chat-sidebar .new-chat-btn:hover { filter:brightness(1.08); }
  /* Sessions */
  .chat-sessions { flex:1; overflow-y:auto; padding:0 8px 8px; }
  .chat-sessions .session-label {
    font-family:var(--font-mono); font-size:10.5px; color:var(--txd);
    text-transform:uppercase; letter-spacing:.12em; padding:12px 10px 5px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .chat-sessions .session-item {
    padding:8px 10px 8px 12px; border-radius:8px; font-size:13px; color:var(--txd);
    cursor:pointer; transition:background .12s; display:flex; flex-direction:column;
    gap:2px; position:relative; border-left:2px solid transparent; margin-bottom:1px;
  }
  .chat-sessions .session-item:hover { background:rgba(255,255,255,.04); color:var(--tx); }
  [data-theme="light"] .chat-sessions .session-item:hover { background:rgba(0,0,0,.03); }
  .chat-sessions .session-item.active { background:var(--acd); color:var(--ac); border-left-color:var(--ac); }
  [dir="rtl"] .chat-sessions .session-item { border-left:none; border-right:2px solid transparent; padding:8px 12px 8px 10px; }
  [dir="rtl"] .chat-sessions .session-item.active { border-right-color:var(--ac); }
  .chat-sessions .session-item .session-title {
    font-weight:500; color:var(--tx); white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; width:100%; padding-right:20px;
  }
  .chat-sessions .session-item.active .session-title { color:var(--ac); }
  .chat-sessions .session-item .session-time { font-family:var(--font-mono); font-size:10.5px; color:var(--txd); }
  .chat-sessions .session-item.active .session-time { color:var(--ac); opacity:.7; }
  .chat-sessions .session-item .del-session {
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    opacity:0; background:none; border:none; color:var(--red,#ff6b6b);
    cursor:pointer; font-size:12px; padding:3px 5px; border-radius:4px; transition:all .15s;
  }
  [dir="rtl"] .chat-sessions .session-item .del-session { right:auto; left:6px; }
  .chat-sessions .session-item:hover .del-session { opacity:1; }
  .chat-sessions .session-item .del-session:hover { background:rgba(255,107,107,.15); }
  /* Sidebar footer */
  .sidebar-footer { border-top:1px solid var(--bd); padding:10px 12px; }
  .sidebar-user {
    display:flex; align-items:center; gap:10px; padding:8px 10px;
    border-radius:8px; margin-top:4px; cursor:pointer; transition:background .12s;
  }
  .sidebar-user:hover { background:rgba(255,255,255,.04); }
  [data-theme="light"] .sidebar-user:hover { background:rgba(0,0,0,.03); }
  .user-avatar {
    width:26px; height:26px; border-radius:50%;
    background:linear-gradient(135deg,#5B9DFF,#B87BFF);
    color:#fff; font-size:12px; font-weight:600;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:12.5px; font-weight:500; color:var(--tx); }
  .user-plan { font-family:var(--font-mono); font-size:10px; color:var(--txd); }

  /* ── Main Area ── */
  .chat-main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
  .chat-quick {
    display:flex; gap:6px; padding:7px 16px; border-bottom:1px solid var(--bd);
    overflow-x:auto; flex-shrink:0; background:var(--sf);
  }
  .chat-quick a {
    padding:5px 10px; border:1px solid var(--bd); border-radius:7px;
    font-size:12px; color:var(--txd); white-space:nowrap;
    display:inline-flex; align-items:center; gap:4px; text-decoration:none; transition:all .15s;
  }
  .chat-quick a:hover { border-color:var(--ac); color:var(--ac); }
  /* Top bar */
  .chat-topbar {
    padding:8px 14px; border-bottom:1px solid var(--bd); display:flex;
    align-items:center; gap:8px; flex-wrap:wrap; background:var(--sf);
    flex-shrink:0; min-height:52px;
  }
  .chat-topbar h2 { font-size:15px; font-weight:600; font-family:var(--font-display); margin-right:auto; }
  /* Custom model picker (replaces plain <select>) */
  .model-select { display:none; } /* hidden — synced to custom picker */
  .model-picker-btn {
    display:flex; align-items:center; gap:7px; padding:6px 10px;
    background:var(--bg); border:1px solid var(--bd); border-radius:8px;
    cursor:pointer; font-size:13px; color:var(--tx); font-family:inherit;
    transition:border-color .12s; position:relative;
  }
  .model-picker-btn:hover { border-color:var(--ac); }
  .model-picker-btn .mpb-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .model-picker-btn .mpb-name { font-weight:500; }
  .model-picker-btn .mpb-vendor { color:var(--txd); font-family:var(--font-mono); font-size:11px; }
  .model-picker-btn .mpb-caret { color:var(--txd); font-size:9px; }
  /* Dropdown */
  .model-dropdown-menu {
    position:absolute; top:calc(100% + 6px); left:0;
    background:var(--sf); border:1px solid var(--bd); border-radius:10px;
    width:280px; padding:5px;
    box-shadow:0 20px 40px rgba(0,0,0,.3); z-index:200; display:none;
  }
  .model-picker-btn.open .model-dropdown-menu { display:block; }
  .mdm-group { font-family:var(--font-mono); font-size:10px; color:var(--txd); text-transform:uppercase; letter-spacing:.12em; padding:7px 10px 3px; }
  .mdm-option { display:flex; align-items:center; gap:9px; padding:7px 10px; border-radius:7px; cursor:pointer; transition:background .1s; }
  .mdm-option:hover { background:rgba(255,255,255,.05); }
  [data-theme="light"] .mdm-option:hover { background:rgba(0,0,0,.04); }
  .mdm-option.active { background:var(--acd); }
  .mdm-option .mdm-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .mdm-option .mdm-info { flex:1; min-width:0; }
  .mdm-option .mdm-name { font-size:13px; font-weight:500; color:var(--tx); }
  .mdm-option .mdm-desc { font-size:11px; color:var(--txd); }
  .mdm-option .mdm-cost { font-family:var(--font-mono); font-size:10.5px; color:var(--ac); }
  /* Multi-model toggle */
  .multi-toggle {
    display:flex; align-items:center; gap:6px; font-size:13px; color:var(--txd);
    cursor:pointer; padding:6px 10px; border:1px solid var(--bd); border-radius:8px;
    background:var(--sf); transition:all .15s; user-select:none;
  }
  .multi-toggle:hover { border-color:var(--ac); }
  .multi-toggle.on { border-color:var(--ac); color:var(--ac); background:var(--acd); }
  .multi-toggle input { accent-color:var(--ac); width:14px; height:14px; }
  .model-cost { font-size:12px; color:var(--ac); font-weight:700; font-family:var(--font-mono); }
  /* Topbar right-side pill buttons */
  .pill-btn {
    display:flex; align-items:center; gap:5px; padding:5px 9px;
    background:var(--bg); border:1px solid var(--bd); border-radius:8px;
    color:var(--txd); cursor:pointer; font-size:12px; font-family:var(--font-mono);
    transition:all .12s;
  }
  .pill-btn:hover { border-color:var(--ac); color:var(--ac); }
  .pill-btn.credits-btn { color:var(--ac); }
  .lang-toggle { display:flex; background:var(--bg); border:1px solid var(--bd); border-radius:8px; padding:2px; }
  .lang-btn {
    background:none; border:none; color:var(--txd); padding:3px 6px; border-radius:5px;
    cursor:pointer; font-family:var(--font-mono); font-size:10.5px; letter-spacing:.05em; transition:all .1s;
  }
  .lang-btn.active { background:var(--sf); color:var(--tx); }

  /* ── Messages ── */
  .chat-msgs { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:16px; }
  .msg-row { display:flex; gap:10px; align-items:flex-start; max-width:86%; animation:msgFadeIn .2s ease; }
  @keyframes msgFadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .msg-row.user { align-self:flex-end; flex-direction:row-reverse; }
  .msg-row.ai   { align-self:flex-start; }
  [dir="rtl"] .msg-row.user { align-self:flex-start; flex-direction:row; }
  [dir="rtl"] .msg-row.ai   { align-self:flex-end; flex-direction:row-reverse; }
  /* Avatars */
  .msg-avatar {
    width:28px; height:28px; border-radius:8px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; position:relative;
  }
  .msg-avatar.user-av { background:var(--ac); color:var(--bg); border-radius:50%; }
  .msg-avatar.ai-av {
    background:rgba(91,157,255,.1); border:1px solid rgba(91,157,255,.2);
    font-size:9px; letter-spacing:.3px; color:var(--txd);
  }
  .msg-avatar.ai-av .model-dot {
    position:absolute; bottom:1px; right:1px;
    width:8px; height:8px; border-radius:50%; border:1.5px solid var(--sf);
  }
  /* Bubbles */
  .msg { padding:11px 15px; border-radius:14px; font-size:14px; line-height:1.6; word-wrap:break-word; position:relative; max-width:100%; }
  .msg.user { background:var(--ac); color:var(--bg); border-bottom-right-radius:3px; box-shadow:0 4px 14px -4px rgba(232,197,71,.3); white-space:pre-wrap; }
  [data-theme="light"] .msg.user { color:#fff; }
  [dir="rtl"] .msg.user { border-bottom-right-radius:14px; border-bottom-left-radius:3px; }
  .msg.ai { background:var(--bg-elevated,var(--sf)); color:var(--tx); border:1px solid var(--bd); border-bottom-left-radius:3px; }
  [dir="rtl"] .msg.ai { border-bottom-left-radius:14px; border-bottom-right-radius:3px; }
  .msg .msg-model { font-size:11px; color:var(--txd); margin-bottom:6px; font-weight:600; display:flex; align-items:center; gap:5px; font-family:var(--font-mono); }
  .msg .msg-model .model-dot-inline { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  /* Code */
  .msg.ai .code-wrap { position:relative; margin:8px 0; }
  .msg.ai .code-wrap pre { background:var(--bg-deep,var(--bg)); padding:12px 14px; border-radius:8px; overflow-x:auto; font-size:12.5px; font-family:var(--font-mono); margin:0; border:1px solid var(--bd); line-height:1.5; }
  .msg.ai .code-wrap .copy-btn { position:absolute; top:6px; right:6px; padding:3px 8px; border:1px solid var(--bd); border-radius:5px; background:var(--sf); color:var(--txd); font-size:11px; cursor:pointer; opacity:0; transition:opacity .15s; font-family:inherit; }
  [dir="rtl"] .msg.ai .code-wrap .copy-btn { right:auto; left:6px; }
  .msg.ai .code-wrap:hover .copy-btn { opacity:1; }
  .msg.ai .code-wrap .copy-btn:hover { background:var(--acd); border-color:var(--ac); color:var(--ac); }
  .msg.ai code { background:rgba(232,197,71,.1); padding:2px 5px; border-radius:4px; font-family:var(--font-mono); font-size:.9em; }
  .msg.ai pre code { background:none; padding:0; border-radius:0; }
  .msg.ai p { margin:0 0 8px; } .msg.ai p:last-child { margin-bottom:0; }
  .msg.ai ul,.msg.ai ol { padding-left:20px; margin:6px 0; }
  [dir="rtl"] .msg.ai ul,[dir="rtl"] .msg.ai ol { padding-left:0; padding-right:20px; }
  .msg.ai li { margin-bottom:4px; }
  .msg.ai h1,.msg.ai h2,.msg.ai h3 { font-weight:700; margin:10px 0 4px; }
  .msg.ai h1 { font-size:1.1em; } .msg.ai h2 { font-size:1.05em; } .msg.ai h3 { font-size:1em; }
  .msg.ai table { border-collapse:collapse; width:100%; margin:8px 0; font-size:13px; }
  .msg.ai th { background:var(--acd); color:var(--ac); padding:6px 10px; text-align:left; }
  .msg.ai td { padding:5px 10px; border-bottom:1px solid var(--bd); }
  .msg.ai blockquote { border-left:3px solid var(--ac); margin:8px 0; padding:4px 12px; color:var(--txd); font-style:italic; }
  [dir="rtl"] .msg.ai blockquote { border-left:none; border-right:3px solid var(--ac); }
  .msg.ai a { color:var(--ac); text-decoration:underline; }
  .msg .msg-img { max-width:200px; border-radius:8px; margin-bottom:6px; display:block; }
  /* Typing */
  .typing-dots { display:inline-flex; gap:5px; align-items:center; padding:2px 0; }
  .typing-dots span { width:6px; height:6px; border-radius:50%; background:var(--txd); animation:typingPulse 1.2s ease-in-out infinite; }
  .typing-dots span:nth-child(2){animation-delay:.2s} .typing-dots span:nth-child(3){animation-delay:.4s}
  @keyframes typingPulse { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
  /* Multi-model */
  .multi-row { display:flex; gap:10px; width:100%; align-self:stretch; flex-wrap:wrap; }
  .multi-row .msg-row { flex:1; min-width:260px; max-width:none; align-self:stretch; }
  .multi-row .msg { flex:1; }
  /* Scroll pill */
  .new-msg-pill {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    background:var(--sf); color:var(--txd); padding:6px 14px; border-radius:20px;
    font-size:12px; cursor:pointer; border:1px solid var(--bd);
    box-shadow:0 4px 14px rgba(0,0,0,.2); z-index:10; white-space:nowrap;
    display:none; font-family:inherit; transition:all .15s;
  }
  .new-msg-pill.visible { display:block; }
  .new-msg-pill:hover { border-color:var(--ac); color:var(--ac); }
  /* Actions bar */
  .chat-actions { padding:5px 16px; display:flex; gap:8px; border-top:1px solid var(--bd); flex-shrink:0; }
  .chat-actions button { padding:5px 12px; border:1px solid var(--bd); border-radius:7px; background:none; color:var(--txd); font-family:inherit; font-size:12px; cursor:pointer; transition:all .15s; }
  .chat-actions button:hover { border-color:var(--ac); color:var(--ac); }
  /* Composer */
  .chat-inputbar {
    padding:10px 16px 14px; border-top:1px solid var(--bd); display:flex; gap:8px;
    align-items:flex-end; background:var(--sf); flex-shrink:0; position:relative;
  }
  .composer-box {
    flex:1; background:var(--bg); border:1px solid var(--bd); border-radius:14px;
    transition:border-color .15s, box-shadow .15s; overflow:hidden;
  }
  .composer-box:focus-within { border-color:rgba(232,197,71,.4); box-shadow:0 0 0 3px rgba(232,197,71,.07); }
  .chat-textarea {
    width:100%; padding:11px 14px 4px; border:none; background:transparent;
    color:var(--tx); font-family:var(--font-en,inherit); font-size:14.5px;
    resize:none; min-height:46px; max-height:180px; line-height:1.5; outline:none;
  }
  .chat-textarea::placeholder { color:var(--txd); }
  .composer-footer { display:flex; align-items:center; justify-content:space-between; padding:3px 6px 6px; }
  .composer-left { display:flex; align-items:center; gap:2px; }
  .composer-hint-text { font-family:var(--font-mono); font-size:10.5px; color:var(--txd); padding:0 6px; }
  .chat-btn {
    width:30px; height:30px; border-radius:7px; border:none;
    background:none; color:var(--txd); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:15px;
    transition:all .12s; flex-shrink:0; position:relative;
  }
  .chat-btn:hover { background:rgba(255,255,255,.06); color:var(--tx); }
  [data-theme="light"] .chat-btn:hover { background:rgba(0,0,0,.05); }
  .chat-btn input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .chat-btn.has-img { color:var(--grn,#51cf66); }
  .chat-btn.recording { color:var(--red,#ff6b6b); animation:voicePulse 1s ease-in-out infinite; }
  .chat-sendbtn {
    width:40px; height:40px; border-radius:10px; border:none;
    background:var(--ac); color:var(--bg); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:18px;
    flex-shrink:0; transition:filter .15s; position:relative;
  }
  .chat-sendbtn:hover { filter:brightness(1.1); }
  .chat-sendbtn:disabled { opacity:.4; cursor:not-allowed; filter:none; }
  .send-cost {
    font-size:10px; color:var(--bg); font-weight:700; position:absolute;
    bottom:-1px; right:-1px; background:rgba(0,0,0,.25);
    padding:0 3px; border-radius:3px; font-family:var(--font-mono);
  }
  @keyframes voicePulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,107,.3)} 50%{box-shadow:0 0 0 8px rgba(255,107,107,0)} }
  /* Sidebar toggle */
  .sidebar-toggle {
    display:none; width:32px; height:32px; border-radius:7px; border:1px solid var(--bd);
    background:var(--bg); color:var(--txd); cursor:pointer;
    align-items:center; justify-content:center; flex-shrink:0; font-size:16px;
  }
  @media (max-width:700px) {
    .chat-sidebar { position:fixed; left:-280px; top:0; bottom:0; z-index:200; transition:left .25s; width:280px; }
    .chat-sidebar.open { left:0; box-shadow:4px 0 20px rgba(0,0,0,.5); }
    [dir="rtl"] .chat-sidebar { left:auto; right:-280px; transition:right .25s; }
    [dir="rtl"] .chat-sidebar.open { right:0; }
    .sidebar-toggle { display:flex; }
    .chat-topbar { gap:6px; min-height:auto; }
    .multi-row { flex-direction:column; }
    .msg-row { max-width:95%; }
    .chat-quick { display:none; }
    .chat-msgs { padding:14px 12px; }
    .model-picker-btn .mpb-vendor { display:none; }
  }
  [data-theme="light"] .chat-msgs { background:var(--bg); }
  [data-theme="light"] .msg.user { color:#fff; }
  @keyframes creditFlash { 0%,100%{opacity:1;transform:scale(1)} 40%{opacity:.45;transform:scale(1.18)} }
  .credit-flash { animation:creditFlash .45s ease; }
  /* Mobile sidebar overlay */
  .sidebar-overlay { display:none; position:fixed; inset:0; z-index:199; background:rgba(0,0,0,.45); }
  @media (max-width:700px) { .sidebar-overlay.active { display:block; } }
</style>

// ── Session Management ──
let sessions = JSON.parse(localStorage.getItem('bq_chat_sessions') || '[]');
let currentSessionId = null;
let chatHistory = [];
let attachedImage = null;

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substring(2, 6); }

function saveSessions() {
  localStorage.setItem('bq_chat_sessions', JSON.stringify(sessions));
}

// ── Relative time helper ──
function relativeTime(iso) {
  if (!iso) return '';
  try {
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    if (hours < 24) return `${hours}h ago`;
    if (days === 1) return 'yesterday';
    if (days < 7) return `${days}d ago`;
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch { return ''; }
}

function newChat() {
  const id = generateId();
  const session = {
    id,
    title: lang === 'he' ? 'צ\'אט חדש' : 'New Chat',
    messages: [],
    createdAt: new Date().toISOString()
  };
  sessions.unshift(session);
  if (sessions.length > 50) sessions.length = 50;
  saveSessions();
  loadSession(id);
  renderSessions();
  closeSidebar();
}

function loadSession(id) {
  const session = sessions.find(s => s.id === id);
  if (!session) return;
  currentSessionId = id;
  chatHistory = session.messages || [];

  // Render messages
  const msgsEl = document.getElementById('chatMsgs');
  msgsEl.innerHTML = '';
  if (chatHistory.length === 0) {
    msgsEl.innerHTML = buildWelcomeRow();
  } else {
    chatHistory.forEach(m => addMsg(m.role, m.content, m.model, m.image, true));
  }
  renderSessions();
}

function buildWelcomeRow() {
  const model = document.getElementById('modelSelect')?.value || 'claude-haiku';
  const dot = MODELS[model]?.dotColor || '#51cf66';
  const text = lang === 'he'
    ? 'היי! אני העוזר AI שלך לבנייה ושיפוצים. שאל אותי כל דבר — הצעות מחיר, היתרים, חומרים, חוזים או שיווק.'
    : "Hi! I'm your AI assistant for construction and remodeling. Ask me anything — bids, permits, materials, contracts, or marketing.";
  return `<div class="msg-row ai">
    <div class="msg-avatar ai-av">AI<span class="model-dot" style="background:${dot};"></span></div>
    <div class="msg ai">${escHtml(text)}</div>
  </div>`;
}

function deleteSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (currentSessionId === id) {
    if (sessions.length > 0) loadSession(sessions[0].id);
    else newChat();
  }
  renderSessions();
}

function saveCurrentSession() {
  if (!currentSessionId) return;
  const session = sessions.find(s => s.id === currentSessionId);
  if (!session) return;
  session.messages = chatHistory.slice(-100);
  // Auto-title from first user message
  const firstUser = chatHistory.find(m => m.role === 'user');
  if (firstUser && session.title.includes('New Chat') || session.title.includes('צ\'אט חדש')) {
    session.title = (typeof firstUser.content === 'string' ? firstUser.content : '').substring(0, 40) || session.title;
  }
  saveSessions();
  renderSessions();
}

function renderSessions() {
  const el = document.getElementById('chatSessions');
  const h = lang === 'he';

  // Group by date
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();

  let html = '';
  let lastGroup = '';

  sessions.forEach(s => {
    const d = new Date(s.createdAt).toDateString();
    let group = '';
    if (d === today) group = h ? 'היום' : 'Today';
    else if (d === yesterday) group = h ? 'אתמול' : 'Yesterday';
    else group = h ? 'ישן' : 'Older';

    if (group !== lastGroup) {
      html += `<div class="session-label">${group}</div>`;
      lastGroup = group;
    }

    const active = s.id === currentSessionId ? ' active' : '';
    const timeStr = relativeTime(s.createdAt);
    html += `<div class="session-item${active}" onclick="loadSession('${s.id}');closeSidebar()">
      <span class="session-title">${escHtml(s.title || 'Chat')}</span>
      ${timeStr ? `<span class="session-time">${timeStr}</span>` : ''}
      <button class="del-session" onclick="event.stopPropagation();deleteSession('${s.id}')" title="Delete">✕</button>
    </div>`;
  });

  el.innerHTML = html || `<div style="padding:16px;text-align:center;color:var(--txd);font-size:13px;">${h ? 'אין צ\'אטים' : 'No chats yet'}</div>`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Voice Input ──
let recognition = null;
let isRecording = false;

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast(lang === 'he' ? 'הדפדפן לא תומך בזיהוי קול' : 'Browser doesn\'t support speech recognition', 'err');
    return;
  }

  if (isRecording) {
    stopVoice();
    return;
  }

  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRec();
  recognition.lang = lang === 'he' ? 'he-IL' : 'en-US';
  recognition.interimResults = true;
  recognition.continuous = true;

  const input = document.getElementById('chatInput');
  const btn = document.getElementById('voiceBtn');
  let finalText = input.value;

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalText += (finalText ? ' ' : '') + e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    input.value = finalText + (interim ? ' ' + interim : '');
    autoGrow(input);
  };

  recognition.onerror = () => stopVoice();
  recognition.onend = () => stopVoice();

  recognition.start();
  isRecording = true;
  btn.classList.add('recording');
  btn.textContent = '⏹';
}

function stopVoice() {
  if (recognition) { try { recognition.stop(); } catch {} }
  isRecording = false;
  const btn = document.getElementById('voiceBtn');
  btn.classList.remove('recording');
  btn.textContent = '🎤';
}

  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();

    attachedImage = await resizeForAPI(ev.target.result);
    document.getElementById('attachBtn').classList.add('has-img');
    showToast(lang === 'he' ? 'תמונה צורפה' : 'Image attached', 'ok');
  };
  r.readAsDataURL(f);
}

    if (!u) return '?';
    const name = u.name || u.email || '';
    return name.charAt(0).toUpperCase() || '?';
  } catch { return '?'; }
}

// ── Format content: markdown for AI, escaped plain text for user ──
function formatContent(text, isAI) {
  if (!isAI) {
    return escHtml(text || '');
  }
  // AI: parse markdown, then wrap code blocks with copy button
  const raw = marked.parse(text || '', { breaks: true, gfm: true });
  // Post-process: wrap <pre> in .code-wrap with copy button
  return raw.replace(/<pre>([\s\S]*?)<\/pre>/g, (match, inner) => {
    const escaped = inner.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    // Strip the outer <code> tags for copy content extraction
    const copyData = inner.replace(/<\/?code[^>]*>/g, '').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
    return `<div class="code-wrap"><pre>${inner}</pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`;
  });
}

// ── Copy code helper ──
function copyCode(btn) {
  const pre = btn.previousElementSibling;
  const text = pre ? (pre.innerText || pre.textContent) : '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  }).catch(() => {
    btn.textContent = 'Copy';
  });
}

// ── Build avatar HTML ──
function buildUserAvatar() {
  const initial = getUserInitial();
  return `<div class="msg-avatar user-av">${escHtml(initial)}</div>`;
}
function buildAiAvatar(model) {
  const dot = MODELS[model]?.dotColor || '#51cf66';
  return `<div class="msg-avatar ai-av">AI<span class="model-dot" style="background:${dot};"></span></div>`;
}

// ── Add Message to UI ──
function addMsg(role, content, model, image, noSave) {
  const msgsEl = document.getElementById('chatMsgs');
  const wasNearBottom = isNearBottom();
  const div = document.createElement('div');

  if (role === 'multi') {
    div.className = 'multi-row';
    div.innerHTML = content.map(r => {
      const dot = MODELS[r.model]?.dotColor || '#51cf66';
      return `<div class="msg-row ai">
        ${buildAiAvatar(r.model)}
        <div class="msg ai">
          <div class="msg-model">
            <span class="model-dot-inline" style="background:${dot};"></span>
            ${escHtml(MODELS[r.model]?.label || r.model)}
          </div>
          ${formatContent(r.text, true)}
        </div>
      </div>`;
    }).join('');
  } else if (role === 'user') {
    div.className = 'msg-row user';
    let imgHtml = '';
    if (image && image !== '(image)') imgHtml = `<img class="msg-img" src="data:image/jpeg;base64,${image}" alt="">`;
    const textContent = typeof content === 'string' ? content : JSON.stringify(content);
    div.innerHTML = `${buildUserAvatar()}
      <div class="msg user">${imgHtml}${formatContent(textContent, false)}</div>`;
  } else {
    // ai
    div.className = 'msg-row ai';
    let inner = '';
    if (model) {
      const dot = MODELS[model]?.dotColor || '#51cf66';
      inner += `<div class="msg-model"><span class="model-dot-inline" style="background:${dot};"></span>${escHtml(MODELS[model]?.label || model)}</div>`;
    }
    if (image && image !== '(image)') inner += `<img class="msg-img" src="data:image/jpeg;base64,${image}" alt="">`;
    const textContent = typeof content === 'string' ? content : JSON.stringify(content);
    inner += formatContent(textContent, true);
    div.innerHTML = `${buildAiAvatar(model || 'claude-haiku')}<div class="msg ai">${inner}</div>`;
  }

  msgsEl.appendChild(div);

  if (wasNearBottom) {
    msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' });
    document.getElementById('newMsgPill').classList.remove('visible');
  } else {
    // Show floating pill only for incoming AI/multi messages
    if (role !== 'user') {
      document.getElementById('newMsgPill').classList.add('visible');
    }
  }

  if (!noSave) {
    chatHistory.push({ role, content, model, image: image ? '(image)' : null });
    if (chatHistory.length > 100) chatHistory.splice(0, chatHistory.length - 100);
    saveCurrentSession();
  }
}

// ── Get Memories for System Prompt ──
function getMemoriesForPrompt() {
  try {
    const mems = JSON.parse(localStorage.getItem('bq_memories') || '[]');
    if (mems.length === 0) return '';
    const sorted = mems.sort((a, b) => (b.importance || 3) - (a.importance || 3)).slice(0, 10);
    return '\n\nUser memories:\n' + sorted.map(m => `- [${m.category}] ${m.content}`).join('\n');
  } catch { return ''; }
}

// ── Send Message ──
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  const multi = document.getElementById('multiToggle').checked;
  const selModel = document.getElementById('modelSelect').value;

  // Calculate cost
  let cost;
  if (multi) {
    cost = 0;
    for (const [k, m] of Object.entries(MODELS)) {
      if (k !== 'manus') cost += m.cost;
    }
  } else {
    cost = MODELS[selModel]?.cost || 1;
  }

  // Confirm credits
  const credits = getCredits();
  if (credits < cost) {
    showNoCreditModal();
    return;
  }
  const ok = await confirmCredit('chat', multi ? 'Multi-Model' : (MODELS[selModel]?.label || 'AI Chat'), cost);
  if (!ok) return;

  input.value = '';
  input.style.height = '60px';
  stopVoice();

  // Show user message
  addMsg('user', text, null, attachedImage || null);

  // Build context messages
  const contextMsgs = chatHistory
    .filter(m => m.role === 'user' || m.role === 'ai')
    .slice(-10)
    .map(m => ({
      role: m.role === 'user' ? 'user' : 'assistant',
      content: typeof m.content === 'string' ? m.content : 'multi-model response'
    }));

  // Add system prompt + memories
  const sysPrompt = SYSTEM_PROMPT + getLangInstruction() + getMemoriesForPrompt();
  contextMsgs.unshift({ role: 'system', content: sysPrompt });
  contextMsgs.push({ role: 'user', content: text });

  const images = attachedImage ? [attachedImage] : [];
  attachedImage = null;
  document.getElementById('attachBtn').classList.remove('has-img');
  document.getElementById('imgInput').value = '';

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  if (multi) {
    // Multi-model: show typing row
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row ai';
    typingRow.innerHTML = `${buildAiAvatar('claude-haiku')}
      <div class="msg ai" style="color:var(--txd);">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span style="margin-left:6px;font-size:13px;">${lang === 'he' ? 'שולח למספר מודלים...' : 'Sending to multiple models...'}</span>
      </div>`;
    document.getElementById('chatMsgs').appendChild(typingRow);
    scrollToBottom();

    const modelsToQuery = Object.entries(MODELS).filter(([k]) => k !== 'manus');
    const results = [];

    const promises = modelsToQuery.map(async ([key]) => {
      try {
        const data = await apiCall('/api/ai/chat', {
          method: 'POST',
          body: { model: key, messages: contextMsgs, images }
        });
        return { model: key, text: data.result };
      } catch (err) {
        return { model: key, text: '❌ ' + (err.message || 'Failed') };
      }
    });

    const settled = await Promise.allSettled(promises);
    settled.forEach(r => {
      if (r.status === 'fulfilled') results.push(r.value);
    });

    typingRow.remove();
    addMsg('multi', results);

  } else {
    // Single model — typing row
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row ai';
    const dot = MODELS[selModel]?.dotColor || '#51cf66';
    typingRow.innerHTML = `${buildAiAvatar(selModel)}
      <div class="msg ai">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>`;
    document.getElementById('chatMsgs').appendChild(typingRow);
    scrollToBottom();

    try {
      const data = await apiCall('/api/ai/chat', {
        method: 'POST',
        body: { model: selModel, messages: contextMsgs, images }
      });
      typingRow.remove();
      addMsg('ai', data.result, selModel);

      // Update credits
      const user = getCachedUser();
      if (user && data.credits !== undefined) {
        user.credits = data.credits;
        setCachedUser(user);
        if (typeof updateCreditDisplay === 'function') updateCreditDisplay();
        const badge = document.getElementById('creditsBadge');
        if (badge) { badge.classList.remove('credit-flash'); void badge.offsetWidth; badge.classList.add('credit-flash'); }
      }

      // Auto-memory: extract facts if enabled
      if (localStorage.getItem('bq_auto_memory') === '1' && data.result) {
        autoExtractMemory(text, data.result);
      }
    } catch (err) {
      typingRow.remove();
      addMsg('ai', '❌ ' + (err.message || 'Error'), selModel);
    }
  }

  sendBtn.disabled = false;
}

// Auto-extract memory from conversation
async function autoExtractMemory(userMsg, aiResponse) {
  if (userMsg.length < 20) return;
  try {
    const mems = JSON.parse(localStorage.getItem('bq_memories') || '[]');
    const patterns = [
      { regex: /my (address|location|office) is/i, cat: 'Address' },
      { regex: /my (phone|number|cell) is/i, cat: 'Contact' },
      { regex: /i prefer|i always|i usually|my favorite/i, cat: 'Preferences' },
      { regex: /my (company|business|firm) (is|name)/i, cat: 'Business' },
    ];
    for (const p of patterns) {
      if (p.regex.test(userMsg)) {
        mems.push({
          id: Date.now().toString(36) + Math.random().toString(36).substring(2, 6),
          content: userMsg.substring(0, 200),
          category: p.cat,
          importance: 3,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          generated: true
        });
        if (mems.length > 200) mems.splice(0, mems.length - 200);
        localStorage.setItem('bq_memories', JSON.stringify(mems));
        apiCall('/api/memories', { method: 'POST', body: { content: userMsg.substring(0, 200), category: p.cat, importance: 3 } }).catch(() => {});
        break;
      }
    }
  } catch {}
}

// ── Clear Chat ──
function clearChat() {
  chatHistory = [];
  saveCurrentSession();
  document.getElementById('chatMsgs').innerHTML = buildWelcomeRow().replace(
    /Hi!.*marketing\./,
    lang === 'he' ? 'הצ\'אט נוקה. שאל אותי הכל!' : 'Chat cleared. Ask me anything!'
  );
  // simpler approach: just rebuild welcome
  document.getElementById('chatMsgs').innerHTML = '';
  const model = document.getElementById('modelSelect').value;
  const dot = MODELS[model]?.dotColor || '#51cf66';

  document.getElementById('chatMsgs').innerHTML = `<div class="msg-row ai">
    <div class="msg-avatar ai-av">AI<span class="model-dot" style="background:${dot};"></span></div>
    <div class="msg ai">${escHtml(text)}</div>
  </div>`;
}

function exportChat() {
  const msgs = chatHistory.filter(m => typeof m.content === 'string');
  if (!msgs.length) { showToast(lang === 'he' ? 'אין הודעות' : 'No messages', 'info'); return; }
  const w = window.open('', '_blank');
  w.document.write(`<html><head><title>BQ AI Chat Export</title>
    <style>body{font-family:system-ui,sans-serif;padding:40px;max-width:700px;margin:0 auto;color:#222;}
    .user{background:#f5f0d0;padding:10px 14px;border-radius:10px;margin:8px 0;}
    .ai{background:#f0f0f0;padding:10px 14px;border-radius:10px;margin:8px 0;}
    .model{font-size:11px;color:#888;margin-bottom:4px;}
    pre{background:#e8e8e8;padding:8px;border-radius:6px;overflow-x:auto;}
    .footer{font-size:10px;color:#aaa;text-align:center;margin-top:20px;border-top:1px solid #eee;padding-top:10px;}</style></head>
    <body><h1>AI Chat — ${new Date().toLocaleDateString()}</h1>
    ${msgs.map(m => `<div class="${m.role}">
      ${m.model ? `<div class="model">${MODELS[m.model]?.label || m.model}</div>` : ''}
      ${m.content.replace(/\n/g, '<br>')}
    </div>`).join('')}
    <div class="footer">Powered by BQ Tools — bqtools.dev</div></body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

// ── Keyboard ──
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Scroll tracking for "new message" pill ──
document.getElementById('chatMsgs').addEventListener('scroll', () => {
  if (isNearBottom()) {
    document.getElementById('newMsgPill').classList.remove('visible');
  }
});

// ── Memory import link visibility ──
(function() {
  const link = document.getElementById('memoryImportLink');
  if (link && localStorage.getItem('bq_memory_imported') === '1') {
    link.style.display = 'none';
  }
})();

// ── Model Picker UI ──
function buildModelDropdown() {
  const dd = document.getElementById('modelDropdown');
  const current = document.getElementById('modelSelect').value;
  let html = '';
  MODEL_GROUPS.forEach(g => {
    html += `<div class="mdm-group">${g.label}</div>`;
    g.keys.forEach(k => {
      const m = MODELS[k]; if (!m || m.enabled === false) return;
      const active = k === current ? ' active' : '';
      const color = getComputedModelColor(k);
      html += `<div class="mdm-option${active}" onclick="selectModel('${k}',event)">
        <div class="mdm-dot" style="background:${m.dotColor};box-shadow:0 0 5px ${m.dotColor}40"></div>
        <div class="mdm-info"><div class="mdm-name">${m.label}</div><div class="mdm-desc">${m.desc||''}</div></div>
        <div class="mdm-cost">⚡${m.cost}</div>
      </div>`;
    });
  });
  dd.innerHTML = html;
}
function getComputedModelColor(key) {
  const m = MODELS[key];
  if (!m) return '#888';
  // Resolve CSS var to actual color if needed
  return m.dotColor;
}
function toggleModelDropdown(e) {
  e.stopPropagation();
  const btn = document.getElementById('modelPickerBtn');
  const opening = !btn.classList.contains('open');
  btn.classList.toggle('open', opening);
  if (opening) buildModelDropdown();
}
function selectModel(key, e) {
  if (e) e.stopPropagation();
  document.getElementById('modelSelect').value = key;
  syncModelPicker();
  document.getElementById('modelPickerBtn').classList.remove('open');
}
function syncModelPicker() {
  let key = document.getElementById('modelSelect').value;
  // Auto-fallback to claude-haiku if selected model is disabled
  if (MODELS[key]?.enabled === false) {
    key = 'claude-haiku';
    document.getElementById('modelSelect').value = key;
  }
  const m = MODELS[key]; if (!m) return;
  document.getElementById('modelDot').style.background = m.dotColor;
  document.getElementById('modelPickerName').textContent = m.label;
  document.getElementById('modelPickerVendor').textContent = '/ ' + (m.vendor || '');
  updateCost();
}
document.addEventListener('click', () => {
  const btn = document.getElementById('modelPickerBtn');
  if (btn) btn.classList.remove('open');
});

// ── Theme toggle ──
function toggleChatTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('bq_theme', next);
  document.getElementById('themeToggleBtn').textContent = next === 'light' ? '☀️' : '🌙';
}

// ── Credits badge + sidebar user info ──
function updateCreditDisplay() {
  try {
    const u = getCachedUser(); if (!u) return;
    const credits = u.credits ?? getCredits() ?? 0;
    const badge = document.getElementById('creditsBadge');
    if (badge) badge.textContent = credits;
    const initial = (u.name || u.email || '?').charAt(0).toUpperCase();
    const av = document.getElementById('sidebarAvatar');
    if (av) av.textContent = initial;
    const nm = document.getElementById('sidebarName');
    if (nm) nm.textContent = u.name || u.email || '—';
    const pl = document.getElementById('sidebarPlan');
    if (pl) pl.textContent = credits + ' credits';
  } catch {}
}

// ── Session search filter ──
function filterSessions(q) {
  const items = document.querySelectorAll('#chatSessions .session-item');
  items.forEach(el => {
    const title = el.querySelector('.session-title')?.textContent?.toLowerCase() || '';
    el.style.display = title.includes(q.toLowerCase()) ? '' : 'none';
  });
  document.querySelectorAll('#chatSessions .session-label').forEach(label => {
    let next = label.nextElementSibling; let hasVisible = false;
    while (next && !next.classList.contains('session-label')) {
      if (next.style.display !== 'none') hasVisible = true;
      next = next.nextElementSibling;
    }
    label.style.display = hasVisible ? '' : 'none';
  });
}

// ── Init marked.js ──
if (typeof marked !== 'undefined') {
  marked.setOptions({ breaks: true, gfm: true });
}

syncModelPicker();
updateCost();
updateCreditDisplay();

} else {

}
renderSessions();

// Handle incoming context (from Content Spy / Moodboard "Inspire me")
(function() {
  try {
    const ctx = JSON.parse(localStorage.getItem('bq_chat_context') || 'null');

      localStorage.removeItem('bq_chat_context');
      newChat();
      setTimeout(() => {
        const input = document.getElementById('chatInput');

          input.value = ctx.prompt;
          autoGrow(input);
          if (ctx.autoSend) setTimeout(() => sendMessage(), 300);
        }
      }, 300);
    }
  } catch {}
})();
