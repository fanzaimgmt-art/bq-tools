<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BQ Tools — AI Chat</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .chat-wrap { flex: 1; display: flex; overflow: hidden; }

  /* ── Sidebar ── */
  .chat-sidebar {
    width: 260px; background: var(--sf); border-right: 1px solid var(--bd);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .memory-import-link {
    display: flex; align-items: center; gap: 6px; margin: 10px 12px 0;
    padding: 8px 12px; border: 1px dashed var(--bd); border-radius: 8px;
    font-size: 12px; color: var(--txd); text-decoration: none; transition: all .15s;
    min-height: 36px;
  }
  .memory-import-link:hover { border-color: var(--ac); color: var(--ac); opacity: 1; }
  .memory-import-link span { flex: 1; }
  .chat-sidebar .new-chat-btn {
    margin: 10px 12px 4px; padding: 12px; border-radius: 10px; border: 1px solid var(--bd);
    background: var(--acd); color: var(--ac); font-family: var(--font-en);
    font-size: 14px; font-weight: 700; cursor: pointer; min-height: 48px;
    transition: all .15s; text-align: center;
  }
  .chat-sidebar .new-chat-btn:hover { background: var(--ac); color: var(--bg); }
  .chat-sessions {
    flex: 1; overflow-y: auto; padding: 0 8px 8px;
  }
  .chat-sessions .session-label {
    font-size: 11px; font-weight: 600; color: var(--txd); text-transform: uppercase;
    letter-spacing: .5px; padding: 8px 8px 4px; margin-top: 4px;
  }
  .chat-sessions .session-item {
    padding: 10px 12px; border-radius: 8px; font-size: 13px; color: var(--txd);
    cursor: pointer; transition: all .15s; overflow: hidden;
    min-height: 44px; display: flex; align-items: flex-start; flex-direction: column;
    gap: 2px; position: relative;
    border-left: 3px solid transparent;
  }
  .chat-sessions .session-item:hover {
    background: rgba(255,255,255,.04); color: var(--tx);
    transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  [data-theme="light"] .chat-sessions .session-item:hover {
    background: rgba(0,0,0,.03); box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .chat-sessions .session-item.active {
    background: var(--acd); color: var(--ac);
    border-left-color: var(--ac);
  }
  [dir="rtl"] .chat-sessions .session-item.active {
    border-left-color: transparent; border-right: 3px solid var(--ac);
  }
  .chat-sessions .session-item .session-title {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    width: 100%; padding-right: 20px;
  }
  .chat-sessions .session-item .session-time {
    font-size: 11px; color: var(--txd); opacity: .7; white-space: nowrap;
  }
  .chat-sessions .session-item.active .session-time { color: var(--ac); opacity: .7; }
  .chat-sessions .session-item .del-session {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    opacity: 0; background: none; border: none; color: var(--red);
    cursor: pointer; font-size: 13px; padding: 4px 6px; flex-shrink: 0;
    border-radius: 4px; transition: all .15s;
  }
  [dir="rtl"] .chat-sessions .session-item .del-session { right: auto; left: 6px; }
  .chat-sessions .session-item:hover .del-session { opacity: 1; }
  .chat-sessions .session-item .del-session:hover { background: rgba(255,107,107,.15); }

  /* ── Main Area ── */
  .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* Quick Actions */
  .chat-quick {
    display: flex; gap: 6px; padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,.04);
    overflow-x: auto; flex-shrink: 0;
  }
  .chat-quick a {
    padding: 6px 12px; border: 1px solid var(--bd); border-radius: 8px;
    font-size: 12px; color: var(--txd); white-space: nowrap; min-height: 32px;
    display: inline-flex; align-items: center; gap: 4px; transition: all .15s;
    text-decoration: none;
  }
  .chat-quick a:hover { border-color: var(--ac); color: var(--ac); opacity: 1; }

  /* Top bar */
  .chat-topbar {
    padding: 10px 16px; border-bottom: 1px solid var(--bd); display: flex;
    align-items: center; gap: 8px; flex-wrap: wrap; background: var(--sf); flex-shrink: 0;
  }
  .chat-topbar h2 { font-size: 16px; font-weight: 700; margin-right: auto; }
  .model-select {
    padding: 8px 12px; border: 1px solid var(--bd); border-radius: 10px;
    background: var(--bg); color: var(--tx); font-family: var(--font-en);
    font-size: 13px; min-height: 40px; cursor: pointer; transition: border-color .15s;
  }
  .model-select:focus { outline: none; border-color: var(--ac); }
  .model-select:hover { border-color: var(--ac); }
  .model-select optgroup { font-weight: 700; color: var(--ac); }
  .multi-toggle {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--txd);
    cursor: pointer; padding: 6px 12px; border: 1px solid var(--bd); border-radius: 8px;
    background: var(--sf); transition: all .15s; min-height: 40px;
  }
  .multi-toggle:hover { border-color: var(--ac); }
  .multi-toggle.on { border-color: var(--ac); color: var(--ac); background: var(--acd); }
  .multi-toggle input { accent-color: var(--ac); width: 16px; height: 16px; }
  .model-cost { font-size: 12px; color: var(--ac); font-weight: 700; }

  /* ── Messages ── */
  .chat-msgs {
    flex: 1; overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* message row = avatar + bubble */
  .msg-row {
    display: flex; gap: 8px; align-items: flex-start;
    max-width: 84%; animation: msgFadeIn .2s ease;
  }
  @keyframes msgFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.ai   { align-self: flex-start; }
  [dir="rtl"] .msg-row.user { align-self: flex-start; flex-direction: row; }
  [dir="rtl"] .msg-row.ai   { align-self: flex-end;   flex-direction: row-reverse; }

  /* Avatars */
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; position: relative;
  }
  .msg-avatar.user-av {
    background: var(--ac); color: var(--bg);
  }
  .msg-avatar.ai-av {
    background: var(--bd); color: var(--tx);
    font-size: 10px; font-weight: 700; letter-spacing: .5px;
  }
  /* colored model dot inside ai avatar */
  .msg-avatar.ai-av .model-dot {
    position: absolute; bottom: 1px; right: 1px;
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid var(--sf);
  }

  /* Bubbles */
  .msg {
    padding: 12px 16px; border-radius: 16px; font-size: 14px;
    line-height: 1.6; word-wrap: break-word; position: relative; max-width: 100%;
  }
  .msg.user {
    background: var(--ac); color: var(--bg);
    border-bottom-right-radius: 3px;
    box-shadow: var(--shadow-bubble-user);
    white-space: pre-wrap;
  }
  [dir="rtl"] .msg.user { border-bottom-right-radius: 16px; border-bottom-left-radius: 3px; }
  .msg.ai {
    background: var(--bg-elevated); color: var(--tx);
    border: 1px solid var(--bd); border-bottom-left-radius: 3px;
    box-shadow: var(--shadow-bubble);
  }
  [dir="rtl"] .msg.ai { border-bottom-left-radius: 16px; border-bottom-right-radius: 3px; }

  /* Model label inside AI bubble */
  .msg .msg-model {
    font-size: 11px; color: var(--txd); margin-bottom: 6px; font-weight: 600;
    display: flex; align-items: center; gap: 5px;
  }
  .msg .msg-model .model-dot-inline {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0;
  }

  /* Code blocks in AI messages */
  .msg.ai .code-wrap {
    position: relative; margin: 8px 0;
  }
  .msg.ai .code-wrap pre {
    background: var(--bg-deep); padding: 12px 14px; border-radius: 8px;
    overflow-x: auto; font-size: 13px; font-family: var(--font-mono);
    margin: 0; border: 1px solid var(--bd); line-height: 1.5;
  }
  [data-theme="light"] .msg.ai .code-wrap pre {
    background: var(--bg-deep); border-color: var(--bd);
  }
  .msg.ai .code-wrap .copy-btn {
    position: absolute; top: 6px; right: 6px;
    padding: 3px 8px; border: 1px solid var(--bd); border-radius: 5px;
    background: var(--bg-elevated); color: var(--txd); font-size: 11px; cursor: pointer;
    opacity: 0; transition: opacity .15s, background .15s; font-family: var(--font-en);
  }
  [dir="rtl"] .msg.ai .code-wrap .copy-btn { right: auto; left: 6px; }
  .msg.ai .code-wrap:hover .copy-btn { opacity: 1; }
  .msg.ai .code-wrap .copy-btn:hover { background: var(--acd); border-color: var(--ac); color: var(--ac); }

  /* Inline code */
  .msg.ai code {
    background: rgba(232,197,71,0.1); padding: 2px 6px; border-radius: 4px;
    font-family: var(--font-mono); font-size: 0.9em;
  }
  /* But not inside pre */
  .msg.ai pre code { background: none; padding: 0; border-radius: 0; font-size: inherit; }

  /* Markdown rendered content spacing */
  .msg.ai p { margin: 0 0 8px; }
  .msg.ai p:last-child { margin-bottom: 0; }
  .msg.ai ul, .msg.ai ol { padding-left: 20px; margin: 6px 0; }
  [dir="rtl"] .msg.ai ul, [dir="rtl"] .msg.ai ol { padding-left: 0; padding-right: 20px; }
  .msg.ai li { margin-bottom: 4px; }
  .msg.ai h1, .msg.ai h2, .msg.ai h3, .msg.ai h4 {
    font-family: inherit; font-size: 1em; font-weight: 700; margin: 10px 0 4px;
    letter-spacing: 0; line-height: 1.3;
  }
  .msg.ai h1 { font-size: 1.1em; }
  .msg.ai table {
    border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px;
  }
  .msg.ai th { background: var(--acd); color: var(--ac); padding: 6px 10px; text-align: left; }
  .msg.ai td { padding: 5px 10px; border-bottom: 1px solid var(--bd); }
  .msg.ai blockquote {
    border-left: 3px solid var(--ac); margin: 8px 0; padding: 4px 12px;
    color: var(--txd); font-style: italic;
  }
  [dir="rtl"] .msg.ai blockquote { border-left: none; border-right: 3px solid var(--ac); padding: 4px 12px 4px 0; }
  .msg.ai a { color: var(--ac); text-decoration: underline; }
  .msg.ai hr { border: none; border-top: 1px solid var(--bd); margin: 10px 0; }

  /* Image in message */
  .msg .msg-img { max-width: 200px; border-radius: 8px; margin-bottom: 6px; display: block; }

  /* Typing animation */
  .typing-dots {
    display: inline-flex; gap: 5px; align-items: center; padding: 2px 0;
  }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--txd);
    animation: typingPulse 1.3s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes typingPulse {
    0%, 60%, 100% { opacity: .3; transform: scale(.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* Multi-model side by side */
  .multi-row { display: flex; gap: 10px; width: 100%; align-self: stretch; }
  .multi-row .msg-row { flex: 1; max-width: none; align-self: stretch; }
  .multi-row .msg { flex: 1; }

  /* Floating "new message" pill */
  .new-msg-pill {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    background: var(--ac); color: var(--bg); padding: 6px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 700; cursor: pointer; border: none;
    box-shadow: 0 4px 12px rgba(0,0,0,.3); z-index: 10; white-space: nowrap;
    animation: pillFadeIn .2s ease; display: none;
  }
  .new-msg-pill.visible { display: block; }
  @keyframes pillFadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(4px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Input bar */
  .chat-inputbar {
    padding: 12px 16px; border-top: 1px solid var(--bd); display: flex; gap: 8px;
    align-items: flex-end; background: var(--sf); flex-shrink: 0; position: relative;
  }
  .chat-textarea {
    flex: 1; padding: 12px 16px; border: 1px solid var(--bd); border-radius: 14px;
    background: var(--bg); color: var(--tx); font-family: var(--font-en);
    font-size: 15px; resize: none; min-height: 60px; max-height: 200px; line-height: 1.5;
    overflow-y: auto;
  }
  .chat-textarea:focus { outline: none; border-color: var(--ac); }
  .chat-btn {
    width: 44px; height: 44px; border-radius: 10px; border: 1px solid var(--bd);
    background: var(--bg); color: var(--txd); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 18px;
    transition: all .15s; flex-shrink: 0; position: relative;
  }
  .chat-btn:hover { border-color: var(--ac); color: var(--ac); }
  .chat-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .chat-btn.has-img { border-color: var(--grn); color: var(--grn); }
  .chat-btn.recording { border-color: var(--red); color: var(--red); animation: voicePulse 1s ease-in-out infinite; }
  .chat-sendbtn {
    width: 48px; height: 48px; border-radius: 12px; border: none;
    background: var(--ac); color: var(--bg); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
    transition: all .15s; position: relative;
  }
  .chat-sendbtn:hover { filter: brightness(1.1); transform: scale(1.04); }
  .chat-sendbtn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .send-cost {
    font-size: 11px; color: var(--ac); font-weight: 700; position: absolute;
    bottom: -2px; right: -2px; background: var(--bg); padding: 0 3px; border-radius: 4px;
  }

  /* Actions bar */
  .chat-actions {
    padding: 6px 16px; display: flex; gap: 8px;
    border-top: 1px solid rgba(255,255,255,.04); flex-shrink: 0;
  }
  .chat-actions button {
    padding: 6px 12px; border: 1px solid var(--bd); border-radius: 8px; background: none;
    color: var(--txd); font-family: inherit; font-size: 12px; cursor: pointer;
    transition: all .15s; min-height: 32px;
  }
  .chat-actions button:hover { border-color: var(--ac); color: var(--ac); }

  /* Voice wave animation */
  @keyframes voicePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,.3); }
    50% { box-shadow: 0 0 0 8px rgba(255,107,107,0); }
  }

  /* Sidebar toggle for mobile */
  .sidebar-toggle {
    display: none; width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--bd);
    background: var(--sf); color: var(--txd); cursor: pointer; font-size: 18px;
    align-items: center; justify-content: center; flex-shrink: 0;
  }

  @media (max-width: 700px) {
    .chat-sidebar {
      position: fixed; left: -280px; top: 0; bottom: 0; z-index: 200;
      transition: left .25s; width: 280px;
    }
    .chat-sidebar.open { left: 0; box-shadow: 4px 0 20px rgba(0,0,0,.5); }
    .sidebar-toggle { display: flex; }
    .chat-topbar { gap: 6px; }
    .chat-topbar h2 { font-size: 14px; }
    .multi-row { flex-direction: column; }
    .msg-row { max-width: 95%; }
    .chat-quick { display: none; }
  }

  /* Light mode tweaks for chat */
  [data-theme="light"] .chat-msgs { background: var(--bg); }
  [data-theme="light"] .msg.user { color: #fff; }
</style>

<body>

<nav class="nav">
  <a href="/home.html" class="nav-logo">BQ <span>Tools</span></a>
  <div class="nav-right">
    <a href="/home.html" class="nav-link" data-en="Tools" data-es="Herramientas" data-he="כלים">Tools</a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="he" onclick="setLang('he')">עב</button>
    </div>
  </div>
</nav>

<div class="chat-wrap">
  <!-- Sidebar -->
  <div class="chat-sidebar" id="chatSidebar">
    <!-- Memory import link — hidden once imported -->
    <a href="/tools/import-memory.html" class="memory-import-link" id="memoryImportLink">
      💡 <span>Import your ChatGPT/Claude memory</span>
    </a>
    <button class="new-chat-btn" onclick="newChat()" data-en="+ New Chat" data-he="+ צ'אט חדש">+ New Chat</button>
    <div class="chat-sessions" id="chatSessions"></div>
  </div>

  <!-- Main -->
  <div class="chat-main">
    <!-- How It Works -->
    <div style="padding:8px 16px 0;">
      <div id="hiw-chat"></div>
    </div>
    <script>document.addEventListener('DOMContentLoaded',()=>{if(typeof buildHowItWorks==='function')buildHowItWorks('hiw-chat',HIW_CONFIGS.chat)});</script>

    <!-- Quick Actions -->
    <div class="chat-quick">
      <a href="/tools/compare.html">🔀 <span data-en="Compare" data-es="Comparar" data-he="השוואה">Compare</span></a>
      <a href="/tools/report.html">📄 <span data-en="Report" data-he="דוח">Report</span></a>
      <a href="/tools/estimate.html">💰 <span data-en="Estimate" data-he="הערכה">Estimate</span></a>
      <a href="/tools/social-post.html">📱 <span data-en="Social Post" data-es="Post Social" data-he="פוסט">Social Post</span></a>
      <a href="/tools/social-analysis.html">📊 <span data-en="Analyze IG" data-he="ניתוח IG">Analyze IG</span></a>
      <a href="/tools/sketch.html">✏️ <span data-en="Sketch" data-he="סקיצה">Sketch</span></a>
    </div>

    <!-- Top bar -->
    <div class="chat-topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <h2 data-en="AI Chat" data-es="Chat IA" data-he="צ'אט AI">AI Chat</h2>

      <select class="model-select" id="modelSelect" onchange="updateCost()">
        <optgroup label="OPENAI">
          <option value="gpt-4o-mini">GPT-4o Mini (⚡1)</option>
          <option value="gpt-4o">GPT-4o (⚡3)</option>
        </optgroup>
        <optgroup label="CLAUDE">
          <option value="claude-haiku" selected>Claude Haiku (⚡1)</option>
          <option value="claude-sonnet">Claude Sonnet (⚡3)</option>
        </optgroup>
        <optgroup label="GOOGLE">
          <option value="gemini-flash">Gemini Flash (⚡1)</option>
          <option value="gemini-pro">Gemini Pro (⚡3)</option>
        </optgroup>
        <optgroup label="GROQ — Ultra Fast">
          <option value="llama-3.3-70b">Llama 3.3 70B (⚡1)</option>
          <option value="mixtral-8x7b">Mixtral 8x7B (⚡1)</option>
        </optgroup>
        <optgroup label="MANUS">
          <option value="manus">Manus Agent (⚡5)</option>
        </optgroup>
      </select>

      <label class="multi-toggle" id="multiToggleLabel" onclick="toggleMulti()">
        <input type="checkbox" id="multiToggle" onchange="updateCost()">
        <span data-en="Multi-Model" data-he="מולטי-מודל">⚡ Multi-Model</span>
      </label>

      <span class="model-cost" id="costDisplay">⚡ 1 credit</span>
    </div>

    <!-- Messages + floating pill container -->
    <div style="flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column;">
      <div class="chat-msgs" id="chatMsgs">
        <div class="msg-row ai">
          <div class="msg-avatar ai-av">AI<span class="model-dot" style="background:#51cf66;"></span></div>
          <div class="msg ai">
            <span data-en="Hi! I'm your AI assistant for construction and remodeling. Ask me anything — bids, permits, materials, contracts, or marketing." data-he="היי! אני העוזר AI שלך לבנייה ושיפוצים. שאל אותי כל דבר — הצעות מחיר, היתרים, חומרים, חוזים או שיווק.">Hi! I'm your AI assistant for construction and remodeling. Ask me anything — bids, permits, materials, contracts, or marketing.</span>
          </div>
        </div>
      </div>
      <button class="new-msg-pill" id="newMsgPill" onclick="scrollToBottom()">↓ New message</button>
    </div>

    <!-- Actions -->
    <div class="chat-actions">
      <button onclick="clearChat()" data-en="Clear Chat" data-he="נקה צ'אט">Clear Chat</button>
      <button onclick="exportChat()" data-en="Export PDF" data-he="ייצוא PDF">Export PDF</button>
    </div>

    <!-- Input -->
    <div class="chat-inputbar">
      <div class="chat-btn" id="attachBtn" title="Attach image">
        📎
        <input type="file" accept="image/*" id="imgInput" onchange="handleAttach(event)">
      </div>
      <div class="chat-btn" id="voiceBtn" onclick="toggleVoice()" title="Voice input">🎤</div>
      <textarea class="chat-textarea" id="chatInput" placeholder="Ask anything..." rows="1" oninput="autoGrow(this)"></textarea>
      <button class="chat-sendbtn" id="sendBtn" onclick="sendMessage()" style="position:relative;">
        ➤
        <span class="send-cost" id="sendCost">⚡1</span>
      </button>
    </div>
  </div>
</div>

<script src="js/ai.js"></script>

// ── Session Management ──
let sessions = JSON.parse(localStorage.getItem('bq_chat_sessions') || '[]');
let currentSessionId = null;
let chatHistory = [];
let attachedImage = null;

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substring(2, 6); }

function saveSessions() {
  localStorage.setItem('bq_chat_sessions', JSON.stringify(sessions));
}

// ── Relative time helper ──
function relativeTime(iso) {
  if (!iso) return '';
  try {
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    if (hours < 24) return `${hours}h ago`;
    if (days === 1) return 'yesterday';
    if (days < 7) return `${days}d ago`;
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch { return ''; }
}

function newChat() {
  const id = generateId();
  const session = {
    id,
    title: lang === 'he' ? 'צ\'אט חדש' : 'New Chat',
    messages: [],
    createdAt: new Date().toISOString()
  };
  sessions.unshift(session);
  if (sessions.length > 50) sessions.length = 50;
  saveSessions();
  loadSession(id);
  renderSessions();
  closeSidebar();
}

function loadSession(id) {
  const session = sessions.find(s => s.id === id);
  if (!session) return;
  currentSessionId = id;
  chatHistory = session.messages || [];

  // Render messages
  const msgsEl = document.getElementById('chatMsgs');
  msgsEl.innerHTML = '';
  if (chatHistory.length === 0) {
    msgsEl.innerHTML = buildWelcomeRow();
  } else {
    chatHistory.forEach(m => addMsg(m.role, m.content, m.model, m.image, true));
  }
  renderSessions();
}

function buildWelcomeRow() {
  const model = document.getElementById('modelSelect')?.value || 'claude-haiku';
  const dot = MODELS[model]?.dotColor || '#51cf66';
  const text = lang === 'he'
    ? 'היי! אני העוזר AI שלך לבנייה ושיפוצים. שאל אותי כל דבר — הצעות מחיר, היתרים, חומרים, חוזים או שיווק.'
    : "Hi! I'm your AI assistant for construction and remodeling. Ask me anything — bids, permits, materials, contracts, or marketing.";
  return `<div class="msg-row ai">
    <div class="msg-avatar ai-av">AI<span class="model-dot" style="background:${dot};"></span></div>
    <div class="msg ai">${escHtml(text)}</div>
  </div>`;
}

function deleteSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (currentSessionId === id) {
    if (sessions.length > 0) loadSession(sessions[0].id);
    else newChat();
  }
  renderSessions();
}

function saveCurrentSession() {
  if (!currentSessionId) return;
  const session = sessions.find(s => s.id === currentSessionId);
  if (!session) return;
  session.messages = chatHistory.slice(-100);
  // Auto-title from first user message
  const firstUser = chatHistory.find(m => m.role === 'user');
  if (firstUser && session.title.includes('New Chat') || session.title.includes('צ\'אט חדש')) {
    session.title = (typeof firstUser.content === 'string' ? firstUser.content : '').substring(0, 40) || session.title;
  }
  saveSessions();
  renderSessions();
}

function renderSessions() {
  const el = document.getElementById('chatSessions');
  const h = lang === 'he';

  // Group by date
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();

  let html = '';
  let lastGroup = '';

  sessions.forEach(s => {
    const d = new Date(s.createdAt).toDateString();
    let group = '';
    if (d === today) group = h ? 'היום' : 'Today';
    else if (d === yesterday) group = h ? 'אתמול' : 'Yesterday';
    else group = h ? 'ישן' : 'Older';

    if (group !== lastGroup) {
      html += `<div class="session-label">${group}</div>`;
      lastGroup = group;
    }

    const active = s.id === currentSessionId ? ' active' : '';
    const timeStr = relativeTime(s.createdAt);
    html += `<div class="session-item${active}" onclick="loadSession('${s.id}');closeSidebar()">
      <span class="session-title">${escHtml(s.title || 'Chat')}</span>
      ${timeStr ? `<span class="session-time">${timeStr}</span>` : ''}
      <button class="del-session" onclick="event.stopPropagation();deleteSession('${s.id}')" title="Delete">✕</button>
    </div>`;
  });

  el.innerHTML = html || `<div style="padding:16px;text-align:center;color:var(--txd);font-size:13px;">${h ? 'אין צ\'אטים' : 'No chats yet'}</div>`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Sidebar Toggle ──
function toggleSidebar() {
  document.getElementById('chatSidebar').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('chatSidebar').classList.remove('open');
}

// ── Multi-Model Toggle ──
function toggleMulti() {
  const cb = document.getElementById('multiToggle');
  // Don't toggle here — the checkbox handles it via onchange
}

function updateCost() {
  const multi = document.getElementById('multiToggle').checked;
  const label = document.getElementById('multiToggleLabel');
  label.classList.toggle('on', multi);

  let cost;
  if (multi) {
    cost = 0;
    for (const [k, m] of Object.entries(MODELS)) {
      if (k !== 'manus') cost += m.cost;
    }
  } else {
    const sel = document.getElementById('modelSelect').value;
    cost = MODELS[sel]?.cost || 1;
  }
  document.getElementById('costDisplay').textContent = `⚡ ${cost} credit${cost > 1 ? 's' : ''}`;
  document.getElementById('sendCost').textContent = `⚡${cost}`;
}

// ── Voice Input ──
let recognition = null;
let isRecording = false;

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast(lang === 'he' ? 'הדפדפן לא תומך בזיהוי קול' : 'Browser doesn\'t support speech recognition', 'err');
    return;
  }

  if (isRecording) {
    stopVoice();
    return;
  }

  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRec();
  recognition.lang = lang === 'he' ? 'he-IL' : 'en-US';
  recognition.interimResults = true;
  recognition.continuous = true;

  const input = document.getElementById('chatInput');
  const btn = document.getElementById('voiceBtn');
  let finalText = input.value;

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalText += (finalText ? ' ' : '') + e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    input.value = finalText + (interim ? ' ' + interim : '');
    autoGrow(input);
  };

  recognition.onerror = () => stopVoice();
  recognition.onend = () => stopVoice();

  recognition.start();
  isRecording = true;
  btn.classList.add('recording');
  btn.textContent = '⏹';
}

function stopVoice() {
  if (recognition) { try { recognition.stop(); } catch {} }
  isRecording = false;
  const btn = document.getElementById('voiceBtn');
  btn.classList.remove('recording');
  btn.textContent = '🎤';
}

// ── Attach Image ──
function handleAttach(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = async ev => {
    attachedImage = await resizeForAPI(ev.target.result);
    document.getElementById('attachBtn').classList.add('has-img');
    showToast(lang === 'he' ? 'תמונה צורפה' : 'Image attached', 'ok');
  };
  r.readAsDataURL(f);
}

// ── Auto Grow Textarea ──
function autoGrow(el) {
  el.style.height = '60px';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

// ── Smooth scroll helpers ──
function isNearBottom() {
  const el = document.getElementById('chatMsgs');
  return el.scrollHeight - el.scrollTop - el.clientHeight < 100;
}
function scrollToBottom() {
  const el = document.getElementById('chatMsgs');
  el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
  document.getElementById('newMsgPill').classList.remove('visible');
}

// ── User avatar initial ──
function getUserInitial() {
  try {
    const u = getCachedUser();
    if (!u) return '?';
    const name = u.name || u.email || '';
    return name.charAt(0).toUpperCase() || '?';
  } catch { return '?'; }
}

// ── Format content: markdown for AI, escaped plain text for user ──
function formatContent(text, isAI) {
  if (!isAI) {
    return escHtml(text || '');
  }
  // AI: parse markdown, then wrap code blocks with copy button
  const raw = marked.parse(text || '', { breaks: true, gfm: true });
  // Post-process: wrap <pre> in .code-wrap with copy button
  return raw.replace(/<pre>([\s\S]*?)<\/pre>/g, (match, inner) => {
    const escaped = inner.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    // Strip the outer <code> tags for copy content extraction
    const copyData = inner.replace(/<\/?code[^>]*>/g, '').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
    return `<div class="code-wrap"><pre>${inner}</pre><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>`;
  });
}

// ── Copy code helper ──
function copyCode(btn) {
  const pre = btn.previousElementSibling;
  const text = pre ? (pre.innerText || pre.textContent) : '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  }).catch(() => {
    btn.textContent = 'Copy';
  });
}

// ── Build avatar HTML ──
function buildUserAvatar() {
  const initial = getUserInitial();
  return `<div class="msg-avatar user-av">${escHtml(initial)}</div>`;
}
function buildAiAvatar(model) {
  const dot = MODELS[model]?.dotColor || '#51cf66';
  return `<div class="msg-avatar ai-av">AI<span class="model-dot" style="background:${dot};"></span></div>`;
}

// ── Add Message to UI ──
function addMsg(role, content, model, image, noSave) {
  const msgsEl = document.getElementById('chatMsgs');
  const wasNearBottom = isNearBottom();
  const div = document.createElement('div');

  if (role === 'multi') {
    div.className = 'multi-row';
    div.innerHTML = content.map(r => {
      const dot = MODELS[r.model]?.dotColor || '#51cf66';
      return `<div class="msg-row ai">
        ${buildAiAvatar(r.model)}
        <div class="msg ai">
          <div class="msg-model">
            <span class="model-dot-inline" style="background:${dot};"></span>
            ${escHtml(MODELS[r.model]?.label || r.model)}
          </div>
          ${formatContent(r.text, true)}
        </div>
      </div>`;
    }).join('');
  } else if (role === 'user') {
    div.className = 'msg-row user';
    let imgHtml = '';
    if (image && image !== '(image)') imgHtml = `<img class="msg-img" src="data:image/jpeg;base64,${image}" alt="">`;
    const textContent = typeof content === 'string' ? content : JSON.stringify(content);
    div.innerHTML = `${buildUserAvatar()}
      <div class="msg user">${imgHtml}${formatContent(textContent, false)}</div>`;
  } else {
    // ai
    div.className = 'msg-row ai';
    let inner = '';
    if (model) {
      const dot = MODELS[model]?.dotColor || '#51cf66';
      inner += `<div class="msg-model"><span class="model-dot-inline" style="background:${dot};"></span>${escHtml(MODELS[model]?.label || model)}</div>`;
    }
    if (image && image !== '(image)') inner += `<img class="msg-img" src="data:image/jpeg;base64,${image}" alt="">`;
    const textContent = typeof content === 'string' ? content : JSON.stringify(content);
    inner += formatContent(textContent, true);
    div.innerHTML = `${buildAiAvatar(model || 'claude-haiku')}<div class="msg ai">${inner}</div>`;
  }

  msgsEl.appendChild(div);

  if (wasNearBottom) {
    msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' });
    document.getElementById('newMsgPill').classList.remove('visible');
  } else {
    // Show floating pill only for incoming AI/multi messages
    if (role !== 'user') {
      document.getElementById('newMsgPill').classList.add('visible');
    }
  }

  if (!noSave) {
    chatHistory.push({ role, content, model, image: image ? '(image)' : null });
    if (chatHistory.length > 100) chatHistory.splice(0, chatHistory.length - 100);
    saveCurrentSession();
  }
}

// ── Get Memories for System Prompt ──
function getMemoriesForPrompt() {
  try {
    const mems = JSON.parse(localStorage.getItem('bq_memories') || '[]');
    if (mems.length === 0) return '';
    const sorted = mems.sort((a, b) => (b.importance || 3) - (a.importance || 3)).slice(0, 10);
    return '\n\nUser memories:\n' + sorted.map(m => `- [${m.category}] ${m.content}`).join('\n');
  } catch { return ''; }
}

// ── Send Message ──
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  const multi = document.getElementById('multiToggle').checked;
  const selModel = document.getElementById('modelSelect').value;

  // Calculate cost
  let cost;
  if (multi) {
    cost = 0;
    for (const [k, m] of Object.entries(MODELS)) {
      if (k !== 'manus') cost += m.cost;
    }
  } else {
    cost = MODELS[selModel]?.cost || 1;
  }

  // Confirm credits
  const credits = getCredits();
  if (credits < cost) {
    showNoCreditModal();
    return;
  }
  const ok = await confirmCredit(`${multi ? 'Multi-Model' : MODELS[selModel]?.label} — ${cost} credit${cost > 1 ? 's' : ''}`);
  if (!ok) return;

  input.value = '';
  input.style.height = '60px';
  stopVoice();

  // Show user message
  addMsg('user', text, null, attachedImage || null);

  // Build context messages
  const contextMsgs = chatHistory
    .filter(m => m.role === 'user' || m.role === 'ai')
    .slice(-10)
    .map(m => ({
      role: m.role === 'user' ? 'user' : 'assistant',
      content: typeof m.content === 'string' ? m.content : 'multi-model response'
    }));

  // Add system prompt + memories
  const sysPrompt = SYSTEM_PROMPT + getLangInstruction() + getMemoriesForPrompt();
  contextMsgs.unshift({ role: 'system', content: sysPrompt });
  contextMsgs.push({ role: 'user', content: text });

  const images = attachedImage ? [attachedImage] : [];
  attachedImage = null;
  document.getElementById('attachBtn').classList.remove('has-img');
  document.getElementById('imgInput').value = '';

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  if (multi) {
    // Multi-model: show typing row
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row ai';
    typingRow.innerHTML = `${buildAiAvatar('claude-haiku')}
      <div class="msg ai" style="color:var(--txd);">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span style="margin-left:6px;font-size:13px;">${lang === 'he' ? 'שולח למספר מודלים...' : 'Sending to multiple models...'}</span>
      </div>`;
    document.getElementById('chatMsgs').appendChild(typingRow);
    scrollToBottom();

    const modelsToQuery = Object.entries(MODELS).filter(([k]) => k !== 'manus');
    const results = [];

    const promises = modelsToQuery.map(async ([key]) => {
      try {
        const data = await apiCall('/api/ai/chat', {
          method: 'POST',
          body: { model: key, messages: contextMsgs, images }
        });
        return { model: key, text: data.result };
      } catch (err) {
        return { model: key, text: '❌ ' + (err.message || 'Failed') };
      }
    });

    const settled = await Promise.allSettled(promises);
    settled.forEach(r => {
      if (r.status === 'fulfilled') results.push(r.value);
    });

    typingRow.remove();
    addMsg('multi', results);

  } else {
    // Single model — typing row
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row ai';
    const dot = MODELS[selModel]?.dotColor || '#51cf66';
    typingRow.innerHTML = `${buildAiAvatar(selModel)}
      <div class="msg ai">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>`;
    document.getElementById('chatMsgs').appendChild(typingRow);
    scrollToBottom();

    try {
      const data = await apiCall('/api/ai/chat', {
        method: 'POST',
        body: { model: selModel, messages: contextMsgs, images }
      });
      typingRow.remove();
      addMsg('ai', data.result, selModel);

      // Update credits
      const user = getCachedUser();
      if (user && data.credits !== undefined) {
        user.credits = data.credits;
        setCachedUser(user);
        if (typeof updateCreditDisplay === 'function') updateCreditDisplay();
      }

      // Auto-memory: extract facts if enabled
      if (localStorage.getItem('bq_auto_memory') === '1' && data.result) {
        autoExtractMemory(text, data.result);
      }
    } catch (err) {
      typingRow.remove();
      addMsg('ai', '❌ ' + (err.message || 'Error'), selModel);
    }
  }

  sendBtn.disabled = false;
}

// Auto-extract memory from conversation
async function autoExtractMemory(userMsg, aiResponse) {
  if (userMsg.length < 20) return;
  try {
    const mems = JSON.parse(localStorage.getItem('bq_memories') || '[]');
    const patterns = [
      { regex: /my (address|location|office) is/i, cat: 'Address' },
      { regex: /my (phone|number|cell) is/i, cat: 'Contact' },
      { regex: /i prefer|i always|i usually|my favorite/i, cat: 'Preferences' },
      { regex: /my (company|business|firm) (is|name)/i, cat: 'Business' },
    ];
    for (const p of patterns) {
      if (p.regex.test(userMsg)) {
        mems.push({
          id: Date.now().toString(36) + Math.random().toString(36).substring(2, 6),
          content: userMsg.substring(0, 200),
          category: p.cat,
          importance: 3,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          generated: true
        });
        if (mems.length > 200) mems.splice(0, mems.length - 200);
        localStorage.setItem('bq_memories', JSON.stringify(mems));
        apiCall('/api/memories', { method: 'POST', body: { content: userMsg.substring(0, 200), category: p.cat, importance: 3 } }).catch(() => {});
        break;
      }
    }
  } catch {}
}

  chatHistory = [];
  saveCurrentSession();
  document.getElementById('chatMsgs').innerHTML = buildWelcomeRow().replace(
    /Hi!.*marketing\./,
    lang === 'he' ? 'הצ\'אט נוקה. שאל אותי הכל!' : 'Chat cleared. Ask me anything!'
  );

  const text = lang === 'he' ? 'הצ\'אט נוקה. שאל אותי הכל!' : 'Chat cleared. Ask me anything!';
  document.getElementById('chatMsgs').innerHTML = `<div class="msg-row ai">
    <div class="msg-avatar ai-av">AI<span class="model-dot" style="background:${dot};"></span></div>
    <div class="msg ai">${escHtml(text)}</div>
  </div>`;
}

// ── Export Chat ──
function exportChat() {
  const msgs = chatHistory.filter(m => typeof m.content === 'string');
  if (!msgs.length) { showToast(lang === 'he' ? 'אין הודעות' : 'No messages', 'info'); return; }
  const w = window.open('', '_blank');
  w.document.write(`<html><head><title>BQ AI Chat Export</title>
    <style>body{font-family:system-ui,sans-serif;padding:40px;max-width:700px;margin:0 auto;color:#222;}
    .user{background:#f5f0d0;padding:10px 14px;border-radius:10px;margin:8px 0;}
    .ai{background:#f0f0f0;padding:10px 14px;border-radius:10px;margin:8px 0;}
    .model{font-size:11px;color:#888;margin-bottom:4px;}
    pre{background:#e8e8e8;padding:8px;border-radius:6px;overflow-x:auto;}
    .footer{font-size:10px;color:#aaa;text-align:center;margin-top:20px;border-top:1px solid #eee;padding-top:10px;}</style></head>
    <body><h1>AI Chat — ${new Date().toLocaleDateString()}</h1>
    ${msgs.map(m => `<div class="${m.role}">

      ${m.content.replace(/\n/g, '<br>')}

    <div class="footer">Powered by BQ Tools — bqtools.dev</div></body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

// Handle incoming context (from Content Spy / Moodboard "Inspire me")
(function() {
  try {
    const ctx = JSON.parse(localStorage.getItem('bq_chat_context') || 'null');
    if (ctx && ctx.prompt) {
      localStorage.removeItem('bq_chat_context');
      newChat();
      setTimeout(() => {
        const input = document.getElementById('chatInput');
        if (input) {
          input.value = ctx.prompt;
          autoGrow(input);
          if (ctx.autoSend) setTimeout(() => sendMessage(), 300);
        }
      }, 300);
    }
  } catch {}
})();
